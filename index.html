/* -------------------- SEARCH -------------------- */
const SearchOverlay = ({ ctx, onClose }) => {
  const { state, setView } = ctx;
  const [q, setQ] = useState('');
  const results = useMemo(() => {
    if (!q.trim()) return [];
    const s = q.toLowerCase();
    const r = [];
    state.ideas.forEach(i => {
      const text = (i.title + ' ' + (i.description || '') + ' ' + (i.comments || []).map(c => c.body).join(' ')).toLowerCase();
      if (text.includes(s)) r.push({ kind: 'Ideja', title: i.title, snippet: i.description?.slice(0, 100), action: () => { onClose(); setView({ name: 'ideas', selectIdea: i.id }); } });
    });
    state.projects.forEach(p => {
      const text = (p.title + ' ' + (p.summary || '') + ' ' + (p.icp || '')).toLowerCase();
      if (text.includes(s)) r.push({ kind: 'Projekt', title: p.title, snippet: p.summary?.slice(0, 100), action: () => { onClose(); setView({ name: 'project', id: p.id }); } });
      p.phases.forEach(ph => ph.steps.forEach(st => {
        if ((st.response || '').toLowerCase().includes(s) || (st.title.toLowerCase().includes(s))) {
          r.push({ kind: 'Korak', title: `${p.title} → ${ph.title} → ${st.title}`, snippet: (st.response || '').slice(0, 100), action: () => { onClose(); setView({ name: 'project', id: p.id }); } });
        }
        (st.comments || []).forEach(c => {
          if (c.body.toLowerCase().includes(s)) r.push({ kind: 'Komentar', title: `${p.title} → ${st.title}`, snippet: c.body.slice(0, 100), action: () => { onClose(); setView({ name: 'project', id: p.id }); } });
        });
      }));
      (state.timelines[p.id] || []).forEach(e => {
        if (e.body.toLowerCase().includes(s)) r.push({ kind: 'Dnevnik', title: p.title, snippet: e.body.slice(0, 100), action: () => { onClose(); setView({ name: 'project', id: p.id }); } });
      });
    });
    state.contacts.forEach(c => {
      const text = (c.name + ' ' + (c.notes || '') + ' ' + (c.interactions || []).map(i => i.summary).join(' ')).toLowerCase();
      if (text.includes(s)) r.push({ kind: 'Kontakt', title: c.name, snippet: c.notes?.slice(0, 100), action: () => { onClose(); setView({ name: 'contacts' }); } });
    });
    state.tasks.forEach(t => {
      if (t.title.toLowerCase().includes(s)) r.push({ kind: 'Naloga', title: t.title, snippet: '', action: () => { onClose(); setView({ name: 'tasks' }); } });
    });
    state.deals.forEach(d => {
      const text = (d.title + ' ' + (d.notes || '')).toLowerCase();
      if (text.includes(s)) r.push({ kind: 'Deal', title: d.title, snippet: (d.notes || '').slice(0, 100), action: () => { onClose(); setView({ name: 'pipeline' }); } });
    });
    return r.slice(0, 30);
  }, [q, state]);

  return (
    <div className="modal-backdrop" onClick={onClose} style={{ alignItems: 'flex-start', paddingTop: 80 }}>
      <div className="modal modal-lg" onClick={e => e.stopPropagation()}>
        <div className="modal-h">
          <Icon name="search" />
          <input className="input" autoFocus placeholder="Išči po vsebinah, komentarjih, dnevniku..." value={q} onChange={e => setQ(e.target.value)}
            style={{ border: 'none', boxShadow: 'none', padding: 0, marginLeft: 8 }} />
          <button className="btn btn-ghost btn-icon" onClick={onClose}><Icon name="x" /></button>
        </div>
        <div className="modal-body" style={{ maxHeight: '60vh' }}>
          {q && results.length === 0 && <div className="text-3 text-sm">Brez zadetkov.</div>}
          {results.map((r, i) => (
            <div key={i} className="clickable" style={{ padding: '10px 0', borderBottom: '1px solid var(--border)' }} onClick={r.action}>
              <div className="flex gap-2" style={{ alignItems: 'center', marginBottom: 4 }}>
                <Badge kind="badge-indigo">{r.kind}</Badge>
                <span style={{ fontWeight: 500 }}>{r.title}</span>
              </div>
              {r.snippet && <div className="text-sm text-2">{r.snippet}</div>}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

/* -------------------- EXPORT MARKDOWN -------------------- */
const ExportMarkdown = ({ project, timeline, tags, weights, finances, onClose }) => {
  const md = useMemo(() => {
    const lines = [];
    lines.push(`# ${project.title}`);
    lines.push('');
    if (project.summary) { lines.push(project.summary); lines.push(''); }
    const tagNames = (project.tags || []).map(id => tags.find(t => t.id === id)?.name).filter(Boolean);
    if (tagNames.length) lines.push(`**Oznake:** ${tagNames.join(', ')}`);
    lines.push(`**Status:** ${project.status} · **Trenutna faza:** ${project.currentPhaseKey} · **Napredek:** ${projectProgress(project)}%`);
    lines.push(`**Sestavljena ocena:** ${computeScore(project.scores, weights) || '–'}`);
    lines.push(`**Ustvarjeno:** ${fmtDate(project.createdAt)} · **Posodobljeno:** ${fmtDate(project.updatedAt)}`);
    lines.push('');
    if (project.icp) { lines.push('## ICP'); lines.push(project.icp); lines.push(''); }

    project.phases.forEach(ph => {
      lines.push(`## Faza ${ph.key} — ${ph.title}`);
      lines.push(`_${ph.summary}_`);
      lines.push(`Status: ${STATUS_LABELS[ph.status]}`);
      lines.push('');
      ph.steps.forEach((s, i) => {
        lines.push(`### ${i + 1}. ${s.title}`);
        lines.push(`Status: ${STATUS_LABELS[s.status]}${s.completedAt ? ` (dokončano ${fmtDate(s.completedAt)})` : ''}`);
        lines.push(s.description);
        if (s.response) { lines.push(''); lines.push('**Odgovor:**'); lines.push(s.response); }
        if ((s.comments || []).length) {
          lines.push('');
          lines.push('**Komentarji:**');
          s.comments.forEach(c => lines.push(`- _${fmtDateTime(c.createdAt)}_ — ${c.body}`));
        }
        lines.push('');
      });
    });

    if ((project.hypotheses || []).length) {
      lines.push('## Hipoteze in eksperimenti');
      project.hypotheses.forEach(h => {
        lines.push(`### ${h.statement}`);
        lines.push(`Tveganje: ${h.risk} · Status: ${h.status}`);
        const exps = (project.experiments || []).filter(e => e.hypothesisId === h.id);
        exps.forEach(e => {
          lines.push(`- **Metoda:** ${e.method}`);
          lines.push(`  **Kriterij:** ${e.successCriteria}`);
          lines.push(`  **Rezultat:** ${e.result}`);
          lines.push(`  **Učenje:** ${e.learning}`);
        });
        lines.push('');
      });
    }

    if (finances.length) {
      lines.push('## Finance');
      finances.forEach(f => lines.push(`- ${fmtDate(f.date)} — strošek ${f.monthlyCost}€, ciljni prihodek ${f.targetRevenue}€, runway ${f.runwayMonths} mes. ${f.assumptions ? '— ' + f.assumptions : ''}`));
      lines.push('');
    }

    if (timeline.length) {
      lines.push('## Dnevnik');
      timeline.slice().sort((a, b) => b.createdAt - a.createdAt).forEach(e => {
        lines.push(`### ${fmtDateTime(e.createdAt)} ${e.kind === 'decision' ? '[ODLOČITEV]' : ''}`);
        lines.push(e.body);
        if (e.decisionRationale) lines.push(`_Razlog:_ ${e.decisionRationale}`);
        lines.push('');
      });
    }

    return lines.join('\n');
  }, [project, timeline, finances, tags, weights]);

  const copy = async () => {
    try { await navigator.clipboard.writeText(md); alert('Markdown prekopiran v odložišče.'); }
    catch { alert('Kopiranje ni uspelo. Označite besedilo ročno.'); }
  };

  return (
    <Modal size="lg" title={`Markdown izvoz — ${project.title}`} onClose={onClose} footer={
      <>
        <button className="btn btn-ghost" onClick={onClose}>Zapri</button>
        <button className="btn btn-primary" onClick={copy}><Icon name="clipboard" />Kopiraj v odložišče</button>
      </>
    }>
      <textarea className="textarea mono" readOnly value={md} style={{ minHeight: 400, fontSize: 12 }} />
    </Modal>
  );
};

              <label className="label">Razlog odločitve</label>
              <textarea className="textarea" value={rationale} onChange={e => setRationale(e.target.value)}
                style={{ minHeight: 60 }} placeholder="Konkretni dejavniki, dokazi, kompromisi." />
            </div>
          )}
          <div className="row-between">
            <span className="text-xs text-3 mono">Ctrl/⌘+Enter shrani</span>
            <div className="flex gap-2">
              <button type="button" className="btn btn-ghost" onClick={onClose}>Prekliči</button>
              <button type="submit" className="btn btn-primary" disabled={!text.trim() || !projectId}>Shrani</button>
            </div>
          </div>
        </form>
      )}
    </Modal>
  );
};

/* -------------------- PWA + BACKUP -------------------- */
const exportWorkspaceJson = (state, currentWs) => {
  const data = {
    appSettings: state.appSettings,
    workspace: currentWs,
    tags: state.tags, ideas: state.ideas, projects: state.projects,
    contacts: state.contacts, tasks: state.tasks, reviews: state.reviews, goals: state.goals,
    finances: state.finances, timelines: state.timelines, deals: state.deals,
    exportedAt: now(), version: 2,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const safeName = (currentWs?.name || 'workspace').replace(/[^a-z0-9-]/gi, '_');
  a.download = `podjetniski-os-${safeName}-${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
};

const BackupBanner = ({ ctx, deferredInstall, onInstall }) => {
  const { state, update } = ctx;
  const [dismissed, setDismissed] = useState(false);
  const last = state.appSettings.lastBackup;
  const daysSince = last ? Math.floor((now() - last) / 86400000) : Infinity;
  const itemCount = state.ideas.length + state.projects.length + state.contacts.length + state.tasks.length;
  const warn = itemCount > 0 && daysSince >= 7;
  const critical = itemCount > 0 && daysSince >= 30;

  if (dismissed || (!warn && !deferredInstall)) return null;

  const currentWs = state.workspaces.find(w => w.id === state.currentWorkspaceId);
  const backup = () => {
    exportWorkspaceJson(state, currentWs);
    update.appSettings({ lastBackup: now() });
    setDismissed(true);
  };

  if (warn) {
    const msg = last
      ? `Zadnji backup: ${fmtRelative(last)}. ${critical ? 'Naredite varnostno kopijo zdaj.' : 'Priporočamo backup workspaca.'}`
      : `Še nimate varnostne kopije workspaca. Naredite jo zdaj.`;
    return (
      <div className={`backup-banner ${critical ? 'danger' : ''}`}>
        <Icon name="download" />
        <span style={{ flex: 1 }}>{msg}</span>
        <button className="btn btn-sm" onClick={backup}><Icon name="download" />Backup zdaj</button>
        {deferredInstall && <button className="btn btn-sm" onClick={onInstall}>Namesti aplikacijo</button>}
        <button className="close-x" onClick={() => setDismissed(true)} title="Zapri">×</button>
      </div>
    );
  }
  if (deferredInstall) {
    return (
      <div className="backup-banner" style={{ background: 'var(--accent-soft)', borderBottomColor: 'var(--accent)', color: 'var(--accent)' }}>
        <Icon name="download" />
        <span style={{ flex: 1 }}>Aplikacijo lahko namestite na napravo za delo brez brskalniške vrstice in offline dostop.</span>
        <button className="btn btn-sm" onClick={onInstall}>Namesti</button>
        <button className="close-x" onClick={() => setDismissed(true)} title="Zapri">×</button>
      </div>
    );
  }
  return null;
};

const ShortcutsHelp = ({ onClose }) => (
  <Modal title="Tipkovne bližnjice" onClose={onClose}>
    <div className="text-2 text-sm mb-3">Bližnjice delujejo, kadar fokus ni v vnosnem polju.</div>
    {[
      ['N', 'Nova ideja'],
      ['T', 'Nova naloga'],
      ['J', 'Dnevniški vnos v trenutnem projektu'],
      ['/', 'Globalno iskanje'],
      ['⌘K / Ctrl+K', 'Globalno iskanje'],
      ['?', 'Ta pomoč'],
      ['Esc', 'Zapri pojavna okna'],
    ].map(([k, l]) => (
      <div key={k} className="kbd-row">
        <span className="text-sm">{l}</span>
        <span className="kbd">{k}</span>
      </div>
    ))}
  </Modal>
);
