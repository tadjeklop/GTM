const HypothesesPanel = ({ project, updateProject }) => {
  const [newHyp, setNewHyp] = useState('');
  const [newRisk, setNewRisk] = useState('medium');
  const [expanded, setExpanded] = useState({});

  const addHyp = () => {
    if (!newHyp.trim()) return;
    updateProject({ hypotheses: [...(project.hypotheses || []), { id: uid(), statement: newHyp.trim(), risk: newRisk, status: 'untested', createdAt: now() }] });
    setNewHyp(''); setNewRisk('medium');
  };
  const updHyp = (id, patch) => updateProject({ hypotheses: project.hypotheses.map(h => h.id === id ? { ...h, ...patch } : h) });
  const delHyp = (id) => updateProject({
    hypotheses: project.hypotheses.filter(h => h.id !== id),
    experiments: (project.experiments || []).filter(e => e.hypothesisId !== id),
  });

  const addExp = (hypId) => {
    updateProject({ experiments: [...(project.experiments || []), {
      id: uid(), hypothesisId: hypId, method: '', successCriteria: '', result: '', learning: '',
      runAt: null, status: 'planned', createdAt: now(),
    }] });
  };
  const updExp = (id, patch) => updateProject({ experiments: project.experiments.map(e => e.id === id ? { ...e, ...patch } : e) });
  const delExp = (id) => updateProject({ experiments: project.experiments.filter(e => e.id !== id) });

  return (
    <div>
      <div className="card mb-4">
        <h3 style={{ margin: '0 0 8px', fontSize: 13, fontWeight: 600 }}>Nova hipoteza</h3>
        <div className="text-2 text-sm mb-3">Trditev, ki bi, če pade, bistveno spremenila smer projekta.</div>
        <div className="flex gap-2">
          <input className="input" value={newHyp} onChange={e => setNewHyp(e.target.value)}
            placeholder="Npr. »Lastniki butičnih restavracij imajo problem A in so zanj pripravljeni plačati X EUR/mesec.«" />
          <select className="select" style={{ width: 130 }} value={newRisk} onChange={e => setNewRisk(e.target.value)}>
            <option value="low">Nizko tveganje</option>
            <option value="medium">Srednje</option>
            <option value="high">Visoko tveganje</option>
          </select>
          <button className="btn btn-primary" onClick={addHyp} disabled={!newHyp.trim()}>Dodaj</button>
        </div>
      </div>

      {(project.hypotheses || []).length === 0 ? (
        <Empty title="Še ni hipotez">Začnite z najbolj tveganimi predpostavkami, ki morajo držati.</Empty>
      ) : (project.hypotheses || []).map(h => {
        const exps = (project.experiments || []).filter(e => e.hypothesisId === h.id);
        const open = !!expanded[h.id];
        return (
          <div key={h.id} className="step">
            <div className="step-h" onClick={() => setExpanded(p => ({ ...p, [h.id]: !p[h.id] }))}>
              <div className="step-num"><Icon name="flask" size={12} /></div>
              <div className="step-title">{h.statement}</div>
              <Badge kind={h.risk === 'high' ? 'badge-red' : h.risk === 'medium' ? 'badge-amber' : 'badge-gray'}>
                {h.risk === 'high' ? 'Visoko' : h.risk === 'medium' ? 'Srednje' : 'Nizko'}
              </Badge>
              <Badge kind={h.status === 'validated' ? 'badge-green' : h.status === 'invalidated' ? 'badge-red' : h.status === 'testing' ? 'badge-amber' : 'badge-gray'}>
                {h.status === 'validated' ? 'Potrjeno' : h.status === 'invalidated' ? 'Ovrženo' : h.status === 'testing' ? 'V teku' : 'Nepreverjeno'}
              </Badge>
              <Icon name={open ? 'chevronDown' : 'chevronRight'} />
            </div>
            {open && (
              <div className="step-body">
                <div className="flex gap-2 mb-3" style={{ flexWrap: 'wrap' }}>
                  <select className="select" style={{ width: 180 }} value={h.status} onChange={e => updHyp(h.id, { status: e.target.value })}>
                    <option value="untested">Nepreverjeno</option>
                    <option value="testing">V testiranju</option>
                    <option value="validated">Potrjeno</option>
                    <option value="invalidated">Ovrženo</option>
                  </select>
                  <select className="select" style={{ width: 150 }} value={h.risk} onChange={e => updHyp(h.id, { risk: e.target.value })}>
                    <option value="low">Nizko tveganje</option>
                    <option value="medium">Srednje</option>
                    <option value="high">Visoko tveganje</option>
                  </select>
                  <textarea className="textarea" value={h.statement} onChange={e => updHyp(h.id, { statement: e.target.value })} style={{ minHeight: 60, flex: 1, minWidth: 300 }} />
                  <button className="btn btn-danger btn-sm" onClick={() => delHyp(h.id)}>Izbriši hipotezo</button>
                </div>
                <div className="row-between mb-2">
                  <div className="text-xs text-3 mono" style={{ textTransform: 'uppercase', letterSpacing: '0.04em' }}>Eksperimenti</div>
                  <button className="btn btn-sm" onClick={() => addExp(h.id)}><Icon name="plus" />Nov eksperiment</button>
                </div>
                {exps.length === 0 ? (
                  <div className="text-3 text-sm">Še ni eksperimentov za to hipotezo.</div>
                ) : exps.map(e => (
                  <div key={e.id} className="card-soft mb-2">
                    <div className="grid grid-2 gap-2">
                      <div>
                        <label className="label">Metoda</label>
                        <textarea className="textarea" value={e.method} onChange={ev => updExp(e.id, { method: ev.target.value })} placeholder="Kaj točno boste naredili?" style={{ minHeight: 50 }} />
                      </div>
                      <div>
                        <label className="label">Kriterij uspeha</label>
                        <textarea className="textarea" value={e.successCriteria} onChange={ev => updExp(e.id, { successCriteria: ev.target.value })} placeholder="Kdaj rečemo, da je hipoteza potrjena/ovržena?" style={{ minHeight: 50 }} />
                      </div>
                      <div>
                        <label className="label">Rezultat</label>
                        <textarea className="textarea" value={e.result} onChange={ev => updExp(e.id, { result: ev.target.value })} style={{ minHeight: 50 }} />
                      </div>
                      <div>
                        <label className="label">Učenje</label>
                        <textarea className="textarea" value={e.learning} onChange={ev => updExp(e.id, { learning: ev.target.value })} style={{ minHeight: 50 }} />
                      </div>
                    </div>
                    <div className="flex gap-2 mt-2" style={{ alignItems: 'center' }}>
                      <select className="select" style={{ width: 150 }} value={e.status} onChange={ev => updExp(e.id, { status: ev.target.value })}>
                        <option value="planned">Načrtovan</option>
                        <option value="running">Teče</option>
                        <option value="done">Zaključen</option>
                      </select>
                      <button className="btn btn-ghost btn-sm" onClick={() => updExp(e.id, { runAt: now() })}>Označi izveden danes</button>
                      <span className="text-xs text-3 mono">{e.runAt ? `Izveden ${fmtDate(e.runAt)}` : 'Še ni izveden'}</span>
                      <button className="btn btn-danger btn-sm" style={{ marginLeft: 'auto' }} onClick={() => delExp(e.id)}>Izbriši</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
};

const FinancePanel = ({ projectId, ctx }) => {
  const { state, update } = ctx;
  const items = state.finances.filter(f => f.projectId === projectId).sort((a, b) => b.date - a.date);
  const [open, setOpen] = useState(false);
  const [form, setForm] = useState({ date: new Date().toISOString().slice(0, 10), monthlyCost: '', targetRevenue: '', runwayMonths: '', assumptions: '' });

  const add = () => {
    const f = {
      id: uid(), projectId, date: new Date(form.date).getTime(),
      monthlyCost: +form.monthlyCost || 0, targetRevenue: +form.targetRevenue || 0,
      runwayMonths: +form.runwayMonths || 0, assumptions: form.assumptions,
    };
    update.finances(prev => [...prev, f]);
    setOpen(false);
    setForm({ date: new Date().toISOString().slice(0, 10), monthlyCost: '', targetRevenue: '', runwayMonths: '', assumptions: '' });
  };

  const del = (id) => update.finances(prev => prev.filter(f => f.id !== id));

  return (
    <div>
      <div className="row-between mb-3">
        <div className="text-2 text-sm">Mesečni finančni posnetki — strošek, ciljni prihodek, runway, predpostavke.</div>
        <button className="btn btn-primary" onClick={() => setOpen(true)}><Icon name="plus" />Nov posnetek</button>

      {items.length === 0 ? (
        <Empty title="Še ni finančnih posnetkov">Dodajte mesečni posnetek, da spremljate ekonomiko skozi čas.</Empty>
      ) : (
        <div className="card" style={{ padding: 0 }}>
          <table className="table">
            <thead><tr>
              <th>Datum</th><th>Mes. strošek</th><th>Ciljni prihodek</th><th>Runway (mes.)</th><th>Predpostavke</th><th></th>
            </tr></thead>
            <tbody>
              {items.map(f => (
                <tr key={f.id}>
                  <td className="mono text-sm">{fmtDate(f.date)}</td>
                  <td className="mono">{f.monthlyCost.toLocaleString('sl-SI')} €</td>
                  <td className="mono">{f.targetRevenue.toLocaleString('sl-SI')} €</td>
                  <td className="mono">{f.runwayMonths}</td>
                  <td className="text-sm text-2">{f.assumptions}</td>
                  <td><button className="btn btn-ghost btn-icon btn-danger" onClick={() => del(f.id)}><Icon name="trash" size={14} /></button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
      {open && (
        <Modal title="Nov finančni posnetek" onClose={() => setOpen(false)} footer={
          <>
            <button className="btn btn-ghost" onClick={() => setOpen(false)}>Prekliči</button>
            <button className="btn btn-primary" onClick={add}>Dodaj</button>
          </>
        }>
          <div className="grid grid-2 gap-3">
            <div><label className="label">Datum</label><input type="date" className="input" value={form.date} onChange={e => setForm({ ...form, date: e.target.value })} /></div>
            <div><label className="label">Mesečni strošek (€)</label><input type="number" className="input" value={form.monthlyCost} onChange={e => setForm({ ...form, monthlyCost: e.target.value })} /></div>
            <div><label className="label">Ciljni prihodek (€)</label><input type="number" className="input" value={form.targetRevenue} onChange={e => setForm({ ...form, targetRevenue: e.target.value })} /></div>
            <div><label className="label">Runway (mesecev)</label><input type="number" className="input" value={form.runwayMonths} onChange={e => setForm({ ...form, runwayMonths: e.target.value })} /></div>
          </div>
          <div className="mt-3"><label className="label">Predpostavke</label><textarea className="textarea" value={form.assumptions} onChange={e => setForm({ ...form, assumptions: e.target.value })} placeholder="Ključne predpostavke za te številke." /></div>
        </Modal>
      )}

  );
};

const TimelinePanel = ({ projectId, ctx }) => {
  const { state, update } = ctx;
  const entries = (state.timelines[projectId] || []).slice().sort((a, b) => b.createdAt - a.createdAt);
  const [text, setText] = useState('');
  const [isDecision, setIsDecision] = useState(false);
  const [rationale, setRationale] = useState('');
  const [filter, setFilter] = useState('all');

  const add = () => {
    if (!text.trim()) return;
    const entry = {
      id: uid(), kind: isDecision ? 'decision' : 'journal',
      body: text.trim(), decisionRationale: isDecision ? rationale.trim() : '',
      createdAt: now(),
    };
    update.timeline(projectId, prev => [entry, ...prev]);
    setText(''); setRationale(''); setIsDecision(false);
  };
  const del = (id) => update.timeline(projectId, prev => prev.filter(e => e.id !== id));

  const filtered = filter === 'all' ? entries :
    filter === 'decisions' ? entries.filter(e => e.kind === 'decision') :
    entries.filter(e => e.kind === filter);

  return (
    <div>
      <div className="card mb-4">
        <label className="label">Nov zapis v dnevniku</label>
        <textarea className="textarea" value={text} onChange={e => setText(e.target.value)}
          placeholder="Kaj se je danes premaknilo? Kaj sem ugotovil/a? Kakšen je naslednji korak?" style={{ minHeight: 80 }} />
        <div className="flex gap-2 mt-2" style={{ alignItems: 'center' }}>
          <label className="flex gap-2 text-sm" style={{ alignItems: 'center', cursor: 'pointer' }}>
            <input type="checkbox" checked={isDecision} onChange={e => setIsDecision(e.target.checked)} />
            <span>Označi kot ključno odločitev</span>
          </label>
          <button className="btn btn-primary" style={{ marginLeft: 'auto' }} onClick={add} disabled={!text.trim()}>Dodaj v dnevnik</button>
        </div>
        {isDecision && (
          <div className="mt-3">
            <label className="label">Razlog odločitve (zakaj prav ta odločitev)</label>
            <textarea className="textarea" value={rationale} onChange={e => setRationale(e.target.value)} placeholder="Konkretni dejavniki, dokazi, kompromisi." style={{ minHeight: 60 }} />
          </div>
        )}
        <LinkHint />
      </div>

      <div className="flex gap-2 mb-3" style={{ alignItems: 'center' }}>
        <span className="text-3 text-sm">Filter:</span>
        <button className={`btn btn-sm ${filter === 'all' ? 'btn-primary' : ''}`} onClick={() => setFilter('all')}>Vse</button>
        <button className={`btn btn-sm ${filter === 'journal' ? 'btn-primary' : ''}`} onClick={() => setFilter('journal')}>Dnevnik</button>
        <button className={`btn btn-sm ${filter === 'decisions' ? 'btn-primary' : ''}`} onClick={() => setFilter('decisions')}>Odločitve</button>
        <button className={`btn btn-sm ${filter === 'comment' ? 'btn-primary' : ''}`} onClick={() => setFilter('comment')}>Komentarji</button>
      </div>

      {filtered.length === 0 ? (
        <Empty title="Še ni zapisov">Dnevnik vam pokaže, kako se je razmišljanje razvijalo skozi mesece.</Empty>
      ) : filtered.map(e => (
        <div key={e.id} className={`timeline-entry ${e.kind === 'decision' ? 'decision' : ''}`}>
          <div className="timeline-meta">
            <span>{fmtDateTime(e.createdAt)} · {fmtRelative(e.createdAt)}</span>
            {e.kind === 'decision' && <Badge kind="badge-indigo">Odločitev</Badge>}
            {e.kind === 'comment' && <Badge kind="badge-gray">Komentar</Badge>}
            <button className="btn btn-ghost btn-icon btn-danger" style={{ marginLeft: 'auto' }} onClick={() => del(e.id)}><Icon name="trash" size={12} /></button>
          </div>
          <div className="timeline-body"><LinkedText text={e.body} ctx={ctx} /></div>

        </div>

/* -------------------- PIPELINE -------------------- */
const PIPELINE_STAGES = [
  { key: 'lead', label: 'Lead', color: '#94A3B8' },
  { key: 'qualifying', label: 'Kvalifikacija', color: '#0EA5E9' },
  { key: 'discovery', label: 'Discovery', color: '#A78BFA' },
  { key: 'proposal', label: 'Ponudba', color: '#F59E0B' },
  { key: 'closing', label: 'Zaključevanje', color: '#EAB308' },
  { key: 'won', label: 'Pridobljeno', color: '#059669' },
  { key: 'lost', label: 'Izgubljeno', color: '#94A3B8' },
];

const PipelineView = ({ ctx }) => {
  const { state, update } = ctx;
  const [editing, setEditing] = useState(null);
  const [newOpen, setNewOpen] = useState(false);
  const [filterProject, setFilterProject] = useState('all');
  const [dragId, setDragId] = useState(null);
  const [dragOverCol, setDragOverCol] = useState(null);

  const visible = state.deals.filter(d => filterProject === 'all' ? true : d.projectId === filterProject);
  const byStage = useMemo(() => {
    const m = {};
    PIPELINE_STAGES.forEach(s => m[s.key] = []);
    visible.forEach(d => { if (m[d.stage]) m[d.stage].push(d); });
    Object.keys(m).forEach(k => m[k].sort((a, b) => b.updatedAt - a.updatedAt));
    return m;
  }, [visible]);
  const sumValue = (deals) => deals.reduce((s, d) => s + (Number(d.value) || 0), 0);
  const pipelineActive = visible.filter(d => d.stage !== 'won' && d.stage !== 'lost');
  const pipelineValue = sumValue(pipelineActive);
  const wonValue = sumValue(visible.filter(d => d.stage === 'won'));

  const moveDeal = (id, stage) => update.deals(prev => prev.map(d => d.id === id ? { ...d, stage, updatedAt: now() } : d));
  const createDeal = (data) => {
    update.deals(prev => [...prev, { id: uid(), ...data, stage: 'lead', createdAt: now(), updatedAt: now() }]);
    setNewOpen(false);
  };
  const updateDeal = (id, patch) => update.deals(prev => prev.map(d => d.id === id ? { ...d, ...patch, updatedAt: now() } : d));
  const deleteDeal = (id) => update.deals(prev => prev.filter(d => d.id !== id));

  const onDragOver = (e, stage) => { e.preventDefault(); if (dragId) setDragOverCol(stage); };
  const onDrop = (stage) => {
    if (dragId) {
      const d = visible.find(x => x.id === dragId);
      if (d && d.stage !== stage) moveDeal(dragId, stage);
    }
    setDragId(null); setDragOverCol(null);
  };

  return (
    <div className="content" style={{ maxWidth: 'none' }}>
      <div className="page-h">
        <div>
          <h1>Pipeline</h1>
          <p>Sales pipeline od leada do podpisa. Povleci-spusti med stolpci.</p>
        </div>
        <div className="page-h-actions">
          <select className="select" style={{ width: 200 }} value={filterProject} onChange={e => setFilterProject(e.target.value)}>
            <option value="all">Vsi projekti</option>
            <option value="">Brez projekta</option>
            {state.projects.filter(p => p.status !== 'archived').map(p => <option key={p.id} value={p.id}>{p.title}</option>)}
          </select>
          <button className="btn btn-primary" onClick={() => setNewOpen(true)}><Icon name="plus" />Nov deal</button>
        </div>
      </div>

      <div className="grid grid-3 mb-4">
        <div className="kpi"><div className="l">Aktivni</div><div className="v">{pipelineActive.length}</div></div>
        <div className="kpi"><div className="l">Vrednost pipelina</div><div className="v">{pipelineValue.toLocaleString('sl-SI')} €</div></div>
        <div className="kpi"><div className="l">Pridobljeno</div><div className="v" style={{ color: 'var(--success)' }}>{wonValue.toLocaleString('sl-SI')} €</div></div>
      </div>

      {visible.length === 0 ? (
        <Empty title="Pipeline je prazen" action={<button className="btn btn-primary" onClick={() => setNewOpen(true)}>Ustvari prvi deal</button>}>
          Dodajte deal — ime, vrednost, povezan kontakt in projekt.
        </Empty>
      ) : (
        <div className="kanban">
          {PIPELINE_STAGES.map(s => (
            <div key={s.key} className={`kanban-col ${dragOverCol === s.key ? 'over' : ''}`}
              onDragOver={(e) => onDragOver(e, s.key)}
              onDragLeave={() => setDragOverCol(c => c === s.key ? null : c)}
              onDrop={() => onDrop(s.key)}>
              <div className="kanban-h">
                <span className="kanban-dot" style={{ background: s.color }} />
                <span>{s.label}</span>
                <span className="text-xs text-3 mono" style={{ marginLeft: 'auto' }}>{byStage[s.key].length}</span>
              </div>
              <div className="kanban-total">{sumValue(byStage[s.key]).toLocaleString('sl-SI')} €</div>
              <div className="kanban-cards">
                {byStage[s.key].map(d => (
                  <DealCard key={d.id} deal={d} ctx={ctx} dragging={dragId === d.id}
                    onOpen={() => setEditing(d.id)}
                    onDragStart={() => setDragId(d.id)}
                    onDragEnd={() => { setDragId(null); setDragOverCol(null); }} />
                ))}
              </div>
            </div>
          ))}
        </div>
      )}

      {newOpen && <DealModal mode="new" ctx={ctx} onSave={createDeal} onClose={() => setNewOpen(false)} />}
      {editing && (() => {
        const d = state.deals.find(x => x.id === editing);
        if (!d) return null;
        return <DealModal mode="edit" deal={d} ctx={ctx}
          onSave={(p) => { updateDeal(editing, p); setEditing(null); }}
          onDelete={() => { deleteDeal(editing); setEditing(null); }}
          onClose={() => setEditing(null)} />;
      })()}
    </div>
  );
};

const DealCard = ({ deal, ctx, onOpen, onDragStart, onDragEnd, dragging }) => {
  const contact = ctx.state.contacts.find(c => c.id === deal.contactId);
  const project = ctx.state.projects.find(p => p.id === deal.projectId);
  const overdue = deal.expectedClose && deal.expectedClose < now() && deal.stage !== 'won' && deal.stage !== 'lost';
  return (
    <div className={`kanban-card ${dragging ? 'dragging' : ''}`} draggable
      onDragStart={onDragStart} onDragEnd={onDragEnd} onClick={onOpen}>
      <div className="row-between" style={{ alignItems: 'flex-start', gap: 8 }}>
        <div style={{ fontWeight: 500, fontSize: 13, lineHeight: 1.35, flex: 1 }}>{deal.title}</div>
        {Number(deal.value) > 0 && <span className="mono text-xs" style={{ color: 'var(--accent)', fontWeight: 500, whiteSpace: 'nowrap' }}>{Number(deal.value).toLocaleString('sl-SI')} €</span>}
      </div>
      {contact && <div className="text-xs text-2" style={{ marginTop: 6 }}>{contact.name}{contact.company ? ` · ${contact.company}` : ''}</div>}
      <div className="row-between" style={{ marginTop: 8, gap: 6 }}>
        {project && <span className="text-xs text-3" style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: 140 }}>{project.title}</span>}
        {deal.expectedClose && (
          <span className="text-xs mono" style={{ color: overdue ? 'var(--danger)' : 'var(--text-3)', marginLeft: 'auto' }}>
            {fmtDate(deal.expectedClose)}
          </span>
        )}
      </div>
    </div>
  );
};

const DealModal = ({ mode, deal, ctx, onSave, onDelete, onClose }) => {
  const { state } = ctx;
  const initial = deal ? {
    title: deal.title, contactId: deal.contactId || '', projectId: deal.projectId || '',
    value: deal.value || 0, expectedClose: deal.expectedClose ? new Date(deal.expectedClose).toISOString().slice(0, 10) : '',

    onSave({

      contactId: f.contactId || null,
      projectId: f.projectId || null,
      value: Number(f.value) || 0,

      notes: f.notes,
      ...(mode === 'edit' ? { stage: f.stage } : {}),

  return (
    <Modal size="lg" title={mode === 'new' ? 'Nov deal' : 'Uredi deal'} onClose={onClose} footer={
      <>
        {mode === 'edit' && <button className="btn btn-danger" onClick={() => setConfirmDel(true)}>Izbriši</button>}
        <button className="btn btn-ghost" onClick={onClose}>Prekliči</button>
        <button className="btn btn-primary" onClick={submit} disabled={!f.title.trim()}>{mode === 'new' ? 'Ustvari' : 'Shrani'}</button>

    }>
      <form onSubmit={submit}>
        <div className="mb-3">
          <label className="label">Naslov deala</label>
          <input autoFocus className="input" value={f.title} onChange={e => setF({ ...f, title: e.target.value })}
            placeholder="Npr. Pizzerija X — paket digital starter" />
        </div>
        <div className="grid grid-2 gap-3 mb-3">
          <div>
            <label className="label">Kontakt</label>
            <select className="select" value={f.contactId} onChange={e => setF({ ...f, contactId: e.target.value })}>
              <option value="">—</option>
              {state.contacts.map(c => <option key={c.id} value={c.id}>{c.name}{c.company ? ` · ${c.company}` : ''}</option>)}
            </select>
          </div>
          <div>
            <label className="label">Projekt</label>
            <select className="select" value={f.projectId} onChange={e => setF({ ...f, projectId: e.target.value })}>
              <option value="">—</option>
              {state.projects.filter(p => p.status !== 'archived').map(p => <option key={p.id} value={p.id}>{p.title}</option>)}
            </select>
          </div>
          <div>
            <label className="label">Vrednost (€)</label>
            <input type="number" className="input" value={f.value} onChange={e => setF({ ...f, value: e.target.value })} />
          </div>
          <div>
            <label className="label">Pričakovan zaključek</label>
            <input type="date" className="input" value={f.expectedClose} onChange={e => setF({ ...f, expectedClose: e.target.value })} />
          </div>
        </div>
        {mode === 'edit' && (
          <div className="mb-3">
            <label className="label">Stanje</label>
            <select className="select" value={f.stage} onChange={e => setF({ ...f, stage: e.target.value })}>
              {PIPELINE_STAGES.map(s => <option key={s.key} value={s.key}>{s.label}</option>)}
            </select>
          </div>
        )}
        <div className="mb-3">
          <label className="label">Opombe</label>
          <textarea className="textarea" value={f.notes} onChange={e => setF({ ...f, notes: e.target.value })} style={{ minHeight: 80 }}
            placeholder="Kontekst pogovorov, ugovori, zgodovina, naslednji koraki." />
        </div>
        {mode === 'edit' && deal && (
          <div className="text-xs text-3 mono">Ustvarjen {fmtDateTime(deal.createdAt)} · Posodobljen {fmtRelative(deal.updatedAt)}</div>
        )}
      </form>
      {confirmDel && (
        <Confirm title="Izbriši deal" body="Tega ni mogoče razveljaviti."
          confirmLabel="Izbriši" danger
          onCancel={() => setConfirmDel(false)}
          onConfirm={() => onDelete()} />
      )}
    </Modal>
  );
};

/* -------------------- TASKS -------------------- */
const TasksView = ({ ctx }) => {
  const { state, update, setView } = ctx;
  const [filter, setFilter] = useState('open');
  const [newOpen, setNewOpen] = useState(false);

  const PRIO_ORDER = { P1: 0, P2: 1, P3: 2 };
  const tasks = state.tasks.filter(t =>
    filter === 'all' ? true :
    filter === 'open' ? t.status !== 'completed' :
    filter === 'overdue' ? t.status !== 'completed' && t.dueDate && t.dueDate < now() :
    filter === 'p1' ? t.status !== 'completed' && (t.priority || 'P2') === 'P1' :
    t.status === filter
  ).sort((a, b) => {
    if (a.status === 'completed' && b.status !== 'completed') return 1;
    if (b.status === 'completed' && a.status !== 'completed') return -1;
    const pa = PRIO_ORDER[a.priority || 'P2'], pb = PRIO_ORDER[b.priority || 'P2'];
    if (pa !== pb) return pa - pb;
    if (a.dueDate && b.dueDate) return a.dueDate - b.dueDate;
    if (a.dueDate) return -1;
    if (b.dueDate) return 1;
    return b.createdAt - a.createdAt;
  });

  const create = (data) => {
    update.tasks(prev => [...prev, { id: uid(), title: data.title, projectId: data.projectId || null,
      dueDate: data.dueDate ? new Date(data.dueDate).getTime() : null,
      priority: data.priority || 'P2',
      status: 'open', createdAt: now() }]);
    setNewOpen(false);
  };
  const toggleDone = (t) => update.tasks(prev => prev.map(x => x.id === t.id ? { ...x, status: x.status === 'completed' ? 'open' : 'completed', completedAt: x.status === 'completed' ? null : now() } : x));
  const del = (id) => update.tasks(prev => prev.filter(t => t.id !== id));

  return (
    <div className="content narrow">
      <div className="page-h">
        <div>
          <h1>Naloge</h1>
          <p>Kaj naredim danes oz. ta teden. Ločeno od korakov v fazah.</p>
        </div>
        <div className="page-h-actions">
          <select className="select" style={{ width: 140 }} value={filter} onChange={e => setFilter(e.target.value)}>
            <option value="open">Odprte</option>
            <option value="p1">Samo P1</option>
            <option value="overdue">Zapadle</option>
            <option value="completed">Dokončane</option>
            <option value="all">Vse</option>
          </select>
          <button className="btn btn-primary" onClick={() => setNewOpen(true)}><Icon name="plus" />Nova naloga</button>
        </div>
      </div>

      {tasks.length === 0 ? (
        <Empty title="Brez nalog">Dodajte konkreten korak za ta teden.</Empty>
      ) : (
        <div className="card" style={{ padding: 0 }}>
          {tasks.map(t => {
            const proj = state.projects.find(p => p.id === t.projectId);
            const overdue = t.dueDate && t.dueDate < now() && t.status !== 'completed';
            return (
              <div key={t.id} style={{ padding: '10px 16px', borderBottom: '1px solid var(--border)', display: 'flex', gap: 10, alignItems: 'center' }}>
                <input type="checkbox" checked={t.status === 'completed'} onChange={() => toggleDone(t)} />
                <span className={`prio-badge prio-${(t.priority || 'P2').toLowerCase()}`}>{t.priority || 'P2'}</span>
                <div style={{ flex: 1 }}>
                  <div style={{ textDecoration: t.status === 'completed' ? 'line-through' : 'none', color: t.status === 'completed' ? 'var(--text-3)' : undefined }}>{t.title}</div>
                  <div className="flex gap-2 text-xs text-3" style={{ marginTop: 3, alignItems: 'center' }}>
                    {proj && <span className="clickable" onClick={() => setView({ name: 'project', id: proj.id })}><Icon name="folder" size={11} /> {proj.title}</span>}
                    {t.dueDate && <span className="mono" style={{ color: overdue ? 'var(--danger)' : undefined }}>do {fmtDate(t.dueDate)}</span>}
                  </div>
                </div>
                <button className="btn btn-ghost btn-icon btn-danger" onClick={() => del(t.id)}><Icon name="trash" size={14} /></button>
              </div>
            );
          })}
        </div>
      )}

      {newOpen && <TaskForm ctx={ctx} onCreate={create} onCancel={() => setNewOpen(false)} />}
    </div>
  );
};

const ContactsView = ({ ctx }) => {
  const { state, update, setView } = ctx;

    const s = search.toLowerCase();

  });

  const create = (data) => {
    const c = { id: uid(), ...data, interactions: [], createdAt: now() };
    update.contacts(prev => [...prev, c]);
    setNewOpen(false); setOpen(c.id);
  };

  return (
    <div className="content">
      <div className="page-h">
        <div><h1>Kontakti</h1><p>Sogovorniki iz validacij, potencialne stranke, partnerji.</p></div>
        <div className="page-h-actions">
          <input className="input" style={{ width: 200 }} placeholder="Išči..." value={search} onChange={e => setSearch(e.target.value)} />
          <button className="btn btn-primary" onClick={() => setNewOpen(true)}><Icon name="plus" />Nov kontakt</button>
        </div>
      </div>
      {filtered.length === 0 ? (
        <Empty title="Brez kontaktov">Dodajte osebe iz intervjujev in prvih pogovorov.</Empty>
      ) : (
        <div className="grid grid-3">
          {filtered.map(c => (
            <div key={c.id} className="card clickable" onClick={() => setOpen(c.id)}>
              <div style={{ fontWeight: 600 }}>{c.name}</div>
              {c.role && <div className="text-sm text-2">{c.role}{c.company ? ` · ${c.company}` : ''}</div>}
              {c.notes && <div className="text-sm text-3 mt-2" style={{ display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>{c.notes}</div>}
              <div className="text-xs text-3 mt-3">{(c.interactions || []).length} {(c.interactions || []).length === 1 ? 'interakcija' : 'interakcij'}</div>
            </div>
          ))}
        </div>
      )}
      {newOpen && <ContactForm ctx={ctx} onCreate={create} onCancel={() => setNewOpen(false)} />}
      {open && <ContactModal id={open} ctx={ctx} onClose={() => setOpen(null)} />}
    </div>
  );
};

    <Modal title={initial ? 'Uredi kontakt' : 'Nov kontakt'} onClose={onCancel} footer={
      <>
        <button className="btn btn-ghost" onClick={onCancel}>Prekliči</button>
        <button className="btn btn-primary" disabled={!f.name.trim()} onClick={() => onCreate(f)}>{initial ? 'Shrani' : 'Ustvari'}</button>
      </>
    }>
      <div className="grid grid-2 gap-3">
        <div><label className="label">Ime in priimek</label><input autoFocus className="input" value={f.name} onChange={e => setF({ ...f, name: e.target.value })} /></div>

        <div><label className="label">Podjetje</label><input className="input" value={f.company} onChange={e => setF({ ...f, company: e.target.value })} /></div>

};

const ContactModal = ({ id, ctx, onClose }) => {
  const { state, update, setView } = ctx;
  const contact = state.contacts.find(c => c.id === id);
  const [edit, setEdit] = useState(false);
  const [intType, setIntType] = useState('interview');
  const [intSummary, setIntSummary] = useState('');
  const [intProjectId, setIntProjectId] = useState('');

  if (!contact) return null;
  const upd = (patch) => update.contacts(prev => prev.map(c => c.id === id ? { ...c, ...patch } : c));
  const addInt = () => {
    if (!intSummary.trim()) return;
    upd({ interactions: [...(contact.interactions || []), { id: uid(), type: intType, summary: intSummary.trim(), projectId: intProjectId || null, date: now() }] });
    setIntSummary('');
  };
  const delInt = (iid) => upd({ interactions: contact.interactions.filter(i => i.id !== iid) });

  return (
    <Modal size="lg" title={contact.name} onClose={onClose} footer={
      <>
        <button className="btn btn-danger" onClick={() => { update.contacts(prev => prev.filter(c => c.id !== id)); onClose(); }}>Izbriši</button>
        <button className="btn" onClick={() => setEdit(true)}>Uredi</button>
      </>
    }>
      <div className="text-2 mb-3">{contact.role}{contact.company ? ` · ${contact.company}` : ''}</div>
      {contact.notes && <div className="card-soft mb-4"><LinkedText text={contact.notes} ctx={ctx} /></div>}

      <div className="card mb-3">
        <label className="label">Nova interakcija</label>
        <div className="flex gap-2 mb-2">
          <select className="select" style={{ width: 140 }} value={intType} onChange={e => setIntType(e.target.value)}>
            <option value="interview">Intervju</option>
            <option value="call">Klic</option>
            <option value="email">Email</option>
            <option value="meeting">Sestanek</option>
            <option value="other">Drugo</option>
          </select>
          <select className="select" style={{ width: 180 }} value={intProjectId} onChange={e => setIntProjectId(e.target.value)}>
            <option value="">Brez projekta</option>
            {state.projects.map(p => <option key={p.id} value={p.id}>{p.title}</option>)}
          </select>
        </div>
        <textarea className="textarea" value={intSummary} onChange={e => setIntSummary(e.target.value)} placeholder="Povzetek pogovora, ključne ugotovitve…" style={{ minHeight: 60 }} />
        <div className="flex" style={{ justifyContent: 'flex-end', marginTop: 8 }}>
          <button className="btn btn-primary" onClick={addInt} disabled={!intSummary.trim()}>Dodaj</button>
        </div>
      </div>

      {(contact.interactions || []).slice().sort((a, b) => b.date - a.date).map(i => {
        const proj = state.projects.find(p => p.id === i.projectId);
        return (
          <div key={i.id} className="timeline-entry">
            <div className="timeline-meta">
              {fmtDateTime(i.date)} · <Badge kind="badge-gray">{i.type}</Badge>
              {proj && <span className="clickable" onClick={() => { onClose(); setView({ name: 'project', id: proj.id }); }}>{proj.title}</span>}
              <button className="btn btn-ghost btn-icon btn-danger" style={{ marginLeft: 'auto' }} onClick={() => delInt(i.id)}><Icon name="trash" size={12} /></button>
            </div>
            <div className="timeline-body"><LinkedText text={i.summary} ctx={ctx} /></div>
          </div>
        );
      })}

      {(() => {
        const contactDeals = state.deals.filter(d => d.contactId === contact.id);
        if (!contactDeals.length) return null;
        return (
          <div className="card-soft mb-4">
            <h3 style={{ margin: '0 0 8px', fontSize: 13, fontWeight: 600 }}>Posli ({contactDeals.length})</h3>
            {contactDeals.map(d => {
              const stage = PIPELINE_STAGES.find(s => s.key === d.stage);
              return (
                <div key={d.id} className="row-between" style={{ padding: '7px 0', borderBottom: '1px solid var(--border)' }}>
                  <span style={{ fontWeight: 500, fontSize: 13 }}>{d.title}</span>
                  <div className="flex gap-2" style={{ alignItems: 'center' }}>
                    {Number(d.value) > 0 && <span className="mono text-xs">{Number(d.value).toLocaleString('sl-SI')} €</span>}
                    <Badge kind={d.stage === 'won' ? 'badge-green' : d.stage === 'lost' ? 'badge-red' : 'badge-gray'}>{stage?.label || d.stage}</Badge>
                  </div>
                </div>
              );
            })}
          </div>
        );
      })()}

      <div className="card-soft mt-4">
        <h3 style={{ margin: '0 0 8px', fontSize: 13, fontWeight: 600 }}>Povezave</h3>
        <Backlinks targetType="contact" targetId={contact.id} ctx={ctx} />
      </div>

      {edit && <ContactForm ctx={ctx} initial={contact} onCancel={() => setEdit(false)}
        onCreate={(f) => { upd(f); setEdit(false); }} />}
    </Modal>
  );
};

/* -------------------- GOALS -------------------- */
const GoalKRRow = ({ kr, goalId, update }) => {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(String(kr.current || 0));
  const save = () => {
    const n = parseFloat(val);
    if (!isNaN(n)) update.goals(prev => prev.map(g => g.id === goalId ? { ...g, keyResults: g.keyResults.map(k => k.id === kr.id ? { ...k, current: n } : k) } : g));
    setEditing(false);
  };
  const pct = Math.min(100, Math.round((kr.current || 0) / Math.max(1, kr.target || 1) * 100));
  return (
    <div className="kr-row">
      <div>
        <div className="text-sm" style={{ fontWeight: 500, marginBottom: 4 }}>{kr.title}</div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <div className="kr-bar" style={{ flex: 1 }}><div style={{ width: `${pct}%` }} /></div>
          <span className="mono text-xs text-3">{pct}%</span>
        </div>
      </div>
      <div className="kr-controls">
        {editing ? (
          <>
            <input className="input" style={{ width: 70 }} value={val} onChange={e => setVal(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') save(); if (e.key === 'Escape') setEditing(false); }} autoFocus />
            <span className="text-xs text-3">/ {kr.target}{kr.unit ? ' ' + kr.unit : ''}</span>
            <button className="btn btn-sm btn-primary" onClick={save}>OK</button>
          </>
        ) : (
          <>
            <span className="mono text-xs" style={{ cursor: 'pointer', minWidth: 60, textAlign: 'right' }} onClick={() => setEditing(true)}>
              {kr.current || 0} / {kr.target}{kr.unit ? ' ' + kr.unit : ''}
            </span>
            <button className="btn btn-ghost btn-icon btn-sm" onClick={() => setEditing(true)} title="Posodobi vrednost">
              <Icon name="edit" size={12} />
            </button>
            <button className="btn btn-ghost btn-icon btn-danger btn-sm"
              onClick={() => update.goals(prev => prev.map(g => g.id === goalId ? { ...g, keyResults: g.keyResults.filter(k => k.id !== kr.id) } : g))}>
              <Icon name="trash" size={12} />
            </button>
          </>
        )}
      </div>
    </div>
  );
};

const GoalsView = ({ ctx }) => {
  const { state, update } = ctx;
  const [open, setOpen] = useState(false);
  const [form, setForm] = useState({ title: '', horizon: 'Q', target: '' });
  const [addingKR, setAddingKR] = useState(null);
  const [krForm, setKrForm] = useState({ title: '', current: '0', target: '100', unit: '' });

  const add = () => {
    if (!form.title.trim()) return;
    update.goals(prev => [...prev, { id: uid(), ...form, title: form.title.trim(), status: 'active', projectIds: [], keyResults: [], createdAt: now() }]);
    setForm({ title: '', horizon: 'Q', target: '' }); setOpen(false);
  };
  const upd = (id, patch) => update.goals(prev => prev.map(g => g.id === id ? { ...g, ...patch } : g));
  const del = (id) => update.goals(prev => prev.filter(g => g.id !== id));

  const addKR = (goalId) => {
    if (!krForm.title.trim()) return;
    update.goals(prev => prev.map(g => g.id === goalId ? {
      ...g, keyResults: [...(g.keyResults || []), {
        id: uid(), title: krForm.title.trim(),
        current: parseFloat(krForm.current) || 0,
        target: parseFloat(krForm.target) || 100,
        unit: krForm.unit.trim(),
      }]
    } : g));
    setKrForm({ title: '', current: '0', target: '100', unit: '' });
    setAddingKR(null);
  };

  const goalProgress = (g) => {
    const krs = g.keyResults || [];
    if (!krs.length) return null;
    return Math.round(krs.reduce((s, kr) => s + Math.min(1, (kr.current || 0) / Math.max(1, kr.target || 1)), 0) / krs.length * 100);
  };

  return (
    <div className="content narrow">
      <div className="page-h">
        <div><h1>Cilji</h1><p>OKR — cilji s ključnimi rezultati za merjenje napredka.</p></div>
        <div className="page-h-actions">
          <button className="btn btn-primary" onClick={() => setOpen(true)}><Icon name="plus" />Nov cilj</button>
        </div>
      </div>
      {state.goals.length === 0 ? (
        <Empty title="Brez ciljev">Definirajte 2–3 cilje za ta kvartal z merljivimi ključnimi rezultati.</Empty>
      ) : state.goals.map(g => {
        const prog = goalProgress(g);
        const krs = g.keyResults || [];
        return (
          <div key={g.id} className="card mb-3">
            <div className="row-between mb-2">
              <div className="flex gap-2" style={{ alignItems: 'center', flex: 1, minWidth: 0 }}>
                <Badge kind={g.status === 'at_risk' ? 'badge-amber' : g.status === 'completed' ? 'badge-green' : 'badge-indigo'}>
                  {g.horizon === 'Q' ? 'Kvartal' : 'Leto'}
                </Badge>
                <span style={{ fontWeight: 600, flex: 1, minWidth: 0, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{g.title}</span>
                {prog !== null && <span className="mono text-xs" style={{ color: prog >= 100 ? 'var(--success)' : 'var(--accent)' }}>{prog}%</span>}
              </div>
              <div className="flex gap-2">
                <select className="select" style={{ width: 120 }} value={g.status} onChange={e => upd(g.id, { status: e.target.value })}>
                  <option value="active">Aktiven</option>
                  <option value="at_risk">Ogrožen</option>
                  <option value="completed">Dokončan</option>
                </select>
                <button className="btn btn-ghost btn-icon btn-danger" onClick={() => del(g.id)}><Icon name="trash" size={14} /></button>
              </div>
            </div>

            {prog !== null && (
              <div className="progress-bar mb-3" style={{ height: 6 }}>
                <div style={{ width: `${prog}%`, background: prog >= 100 ? 'var(--success)' : undefined }} />
              </div>
            )}

            {g.target && krs.length === 0 && <div className="text-sm text-2 mb-3">{g.target}</div>}

            {krs.length > 0 && (
              <div className="card-soft mb-3" style={{ padding: '4px 12px' }}>
                {krs.map(kr => <GoalKRRow key={kr.id} kr={kr} goalId={g.id} update={update} />)}
              </div>
            )}

            {addingKR === g.id ? (
              <div className="card-soft mb-2" style={{ padding: 12 }}>
                <div className="text-xs text-3 mb-2" style={{ fontWeight: 600 }}>Nov ključni rezultat</div>
                <input className="input mb-2" value={krForm.title} onChange={e => setKrForm({ ...krForm, title: e.target.value })}
                  placeholder="Npr. MRR doseže" autoFocus />
                <div className="grid grid-2 gap-2 mb-2" style={{ gridTemplateColumns: '1fr 1fr 80px' }}>
                  <div><label className="label">Začetna vrednost</label>
                    <input type="number" className="input" value={krForm.current} onChange={e => setKrForm({ ...krForm, current: e.target.value })} /></div>
                  <div><label className="label">Ciljeva vrednost</label>
                    <input type="number" className="input" value={krForm.target} onChange={e => setKrForm({ ...krForm, target: e.target.value })} /></div>
                  <div><label className="label">Enota</label>
                    <input className="input" value={krForm.unit} onChange={e => setKrForm({ ...krForm, unit: e.target.value })} placeholder="€, %, kom" /></div>
                </div>
                <div className="flex gap-2">
                  <button className="btn btn-ghost btn-sm" onClick={() => setAddingKR(null)}>Prekliči</button>
                  <button className="btn btn-primary btn-sm" disabled={!krForm.title.trim()} onClick={() => addKR(g.id)}>Dodaj KR</button>
                </div>
              </div>
            ) : (
              <button className="btn btn-ghost btn-sm" onClick={() => { setAddingKR(g.id); setKrForm({ title: '', current: '0', target: '100', unit: '' }); }}>
                <Icon name="plus" size={13} />Dodaj ključni rezultat
              </button>
            )}

            <div className="mt-3">
              <div className="text-xs text-3 mb-2">Povezani projekti</div>
              <div className="flex gap-2" style={{ flexWrap: 'wrap' }}>
                {state.projects.filter(p => p.status !== 'archived').map(p => {
                  const linked = (g.projectIds || []).includes(p.id);
                  return (
                    <button key={p.id} className={`btn btn-sm ${linked ? 'btn-primary' : ''}`}
                      onClick={() => upd(g.id, { projectIds: linked ? g.projectIds.filter(x => x !== p.id) : [...(g.projectIds || []), p.id] })}>
                      {p.title}
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        );
      })}
      {open && (
        <Modal title="Nov cilj" onClose={() => setOpen(false)} footer={
          <>
            <button className="btn btn-ghost" onClick={() => setOpen(false)}>Prekliči</button>
            <button className="btn btn-primary" onClick={add} disabled={!form.title.trim()}>Ustvari</button>
          </>
        }>
          <div className="mb-3"><label className="label">Naslov cilja</label>
            <input autoFocus className="input" value={form.title} onChange={e => setForm({ ...form, title: e.target.value })} placeholder="Npr. Prvih 5 plačujočih strank" /></div>
          <div className="grid grid-2 gap-3">
            <div><label className="label">Horizont</label>
              <select className="select" value={form.horizon} onChange={e => setForm({ ...form, horizon: e.target.value })}>
                <option value="Q">Kvartalno</option>
                <option value="Y">Letno</option>
              </select></div>
            <div><label className="label">Opis cilja (neobvezno)</label>
              <input className="input" value={form.target} onChange={e => setForm({ ...form, target: e.target.value })} placeholder="3000 € MRR" /></div>
          </div>
          <div className="help mt-2">Ključne rezultate dodajte po ustvaritvi cilja.</div>
        </Modal>
      )}
    </div>
  );
};

/* -------------------- ANALYTICS -------------------- */
const FinanceAggregate = ({ ctx }) => {
  const { state } = ctx;
  const rows = useMemo(() => {
    return state.projects
      .filter(p => p.status !== 'archived')
      .map(p => {
        const snaps = state.finances.filter(f => f.projectId === p.id).sort((a, b) => b.date - a.date);
        const latest = snaps[0];
        return latest ? { id: p.id, title: p.title, status: p.status, ...latest } : null;
      })
      .filter(Boolean)
      .sort((a, b) => (a.runwayMonths || 99) - (b.runwayMonths || 99));
  }, [state.projects, state.finances]);

  if (!rows.length) return null;

  const totalBurn = rows.reduce((s, r) => s + (r.monthlyCost || 0), 0);
  const totalARR = rows.reduce((s, r) => s + (r.targetRevenue || 0) * 12, 0);

  return (
    <div className="card" style={{ padding: 0 }}>
      <div className="card-h">
        <h3>Portfelj — finance</h3>
        <span className="text-3 text-xs mono" style={{ marginLeft: 'auto' }}>zadnji posnetek na projekt</span>
      </div>
      <table className="table">
        <thead><tr>
          <th>Projekt</th>
          <th>Mes. strošek</th>
          <th>Ciljni ARR</th>
          <th>Runway</th>
          <th>Datum posnetka</th>
        </tr></thead>
        <tbody>
          {rows.map(r => (
            <tr key={r.id}>
              <td style={{ fontWeight: 500 }}>{r.title}</td>
              <td className="mono">{(r.monthlyCost || 0).toLocaleString('sl-SI')} €</td>
              <td className="mono">{((r.targetRevenue || 0) * 12).toLocaleString('sl-SI')} €</td>
              <td>
                <span className="mono" style={{ color: (r.runwayMonths || 0) <= 3 ? 'var(--danger)' : (r.runwayMonths || 0) <= 6 ? 'var(--warn)' : 'var(--success)' }}>
                  {r.runwayMonths || '—'} mes.
                </span>
              </td>
              <td className="mono text-xs text-3">{fmtDate(r.date)}</td>
            </tr>
          ))}
        </tbody>
        <tfoot>
          <tr style={{ background: 'var(--panel)' }}>
            <td style={{ fontWeight: 600 }}>Skupaj</td>
            <td className="mono" style={{ fontWeight: 600 }}>{totalBurn.toLocaleString('sl-SI')} €</td>
            <td className="mono" style={{ fontWeight: 600 }}>{totalARR.toLocaleString('sl-SI')} €</td>
            <td colSpan={2} />
          </tr>
        </tfoot>
      </table>
    </div>
  );
};

      <div className="page-h">
        <div><h1>Analitika</h1><p>Trendi in vzorci skozi čas — kje se delo dogaja, kje zaspi.</p></div>

  );
};

const dayStart = (ts) => { const d = new Date(ts); d.setHours(0,0,0,0); return d.getTime(); };

const ActivityHeatmap = ({ ctx }) => {
  const { state } = ctx;
  const days = useMemo(() => {
    const map = {};
    const add = (ts) => { if (!ts) return; const k = dayStart(ts); map[k] = (map[k] || 0) + 1; };
    state.ideas.forEach(i => { add(i.createdAt); (i.comments || []).forEach(c => add(c.createdAt)); });
    state.projects.forEach(p => {
      add(p.createdAt);
      p.phases.forEach(ph => ph.steps.forEach(s => {
        if (s.completedAt) add(s.completedAt);
        (s.comments || []).forEach(c => add(c.createdAt));
      }));
    });
    Object.values(state.timelines).forEach(arr => arr.forEach(e => add(e.createdAt)));
    state.tasks.forEach(t => { add(t.createdAt); if (t.completedAt) add(t.completedAt); });
    state.deals.forEach(d => { add(d.createdAt); if (d.updatedAt && d.updatedAt !== d.createdAt) add(d.updatedAt); });
    state.reviews.forEach(r => add(r.date));
    state.contacts.forEach(c => (c.interactions || []).forEach(i => add(i.date)));
    state.finances.forEach(f => add(f.date));
    return map;
  }, [state]);

  const today = new Date(); today.setHours(0,0,0,0);
  const cells = [];
  for (let w = 52; w >= 0; w--) {
    const week = [];
    for (let d = 0; d < 7; d++) {
      const date = new Date(today);
      date.setDate(today.getDate() - (w * 7 + (6 - d)));
      const count = days[date.getTime()] || 0;
      week.push({ date, count });
    }
    cells.push(week);
  }

  const maxCount = Math.max(1, ...Object.values(days));
  const color = (c) => {
    if (!c) return 'var(--panel)';
    const intensity = Math.log(c + 1) / Math.log(maxCount + 1);
    const opacity = 0.18 + Math.min(1, intensity) * 0.82;
    return `rgba(79, 70, 229, ${opacity.toFixed(2)})`;
  };

  const totalActive = Object.keys(days).length;
  const totalEvents = Object.values(days).reduce((s, n) => s + n, 0);
  const todayCount = days[today.getTime()] || 0;

  return (
    <div className="card" style={{ padding: 14 }}>
      <div className="row-between mb-3">
        <h3 style={{ margin: 0, fontSize: 13, fontWeight: 600 }}>Aktivnost (365 dni)</h3>
        <span className="text-xs text-3 mono">{totalEvents} dogodkov · {totalActive} aktivnih dni</span>
      </div>
      <div style={{ display: 'flex', gap: 2, overflowX: 'auto', paddingBottom: 4 }}>
        {cells.map((week, wi) => (
          <div key={wi} style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
            {week.map((cell, di) => (
              <div key={di} title={`${cell.date.toLocaleDateString('sl-SI')}: ${cell.count}`}
                style={{ width: 11, height: 11, borderRadius: 2, background: color(cell.count) }} />
            ))}
          </div>
        ))}
      </div>
      <div className="flex gap-2" style={{ alignItems: 'center', marginTop: 12, fontSize: 11, color: 'var(--text-3)' }}>
        <span style={{ marginRight: 'auto' }}>Danes: {todayCount}</span>
        <span>manj</span>
        {[0, 0.25, 0.5, 0.75, 1].map((i, idx) => (
          <div key={idx} style={{ width: 11, height: 11, borderRadius: 2,
            background: i === 0 ? 'var(--panel)' : `rgba(79, 70, 229, ${(0.18 + i * 0.82).toFixed(2)})` }} />
        ))}
        <span>več</span>
      </div>
    </div>
  );
};

const VelocityChart = ({ ctx }) => {
  const { state } = ctx;
  const weeks = useMemo(() => {
    const today = new Date(); today.setHours(0,0,0,0);
    const dow = today.getDay() || 7;
    const monday = new Date(today); monday.setDate(today.getDate() - (dow - 1));
    const result = [];
    for (let i = 11; i >= 0; i--) {
      const start = new Date(monday); start.setDate(monday.getDate() - i * 7);
      const end = new Date(start); end.setDate(start.getDate() + 7);
      let stepsDone = 0, tasksDone = 0, journalEntries = 0;
      state.projects.forEach(p => p.phases.forEach(ph => ph.steps.forEach(s => {
        if (s.completedAt && s.completedAt >= start.getTime() && s.completedAt < end.getTime()) stepsDone++;
      })));
      state.tasks.forEach(t => { if (t.completedAt && t.completedAt >= start.getTime() && t.completedAt < end.getTime()) tasksDone++; });
      Object.values(state.timelines).forEach(arr => arr.forEach(e => {
        if (e.createdAt >= start.getTime() && e.createdAt < end.getTime()) journalEntries++;
      }));
      result.push({ start, stepsDone, tasksDone, journalEntries, total: stepsDone + tasksDone + journalEntries });
    }
    return result;
  }, [state]);
  const max = Math.max(1, ...weeks.map(w => w.total));
  const total = weeks.reduce((s, w) => s + w.total, 0);
  const avgPerWeek = (total / 12).toFixed(1);

  return (
    <div className="card" style={{ padding: 14 }}>
      <div className="row-between mb-3">
        <h3 style={{ margin: 0, fontSize: 13, fontWeight: 600 }}>Velocity (12 tednov)</h3>
        <span className="text-xs text-3 mono">povprečje {avgPerWeek}/teden</span>
      </div>
      <div style={{ display: 'flex', alignItems: 'flex-end', gap: 6, height: 160 }}>
        {weeks.map((w, i) => {
          const h = (w.total / max) * 100;
          const sH = (w.stepsDone / max) * 100;
          const tH = (w.tasksDone / max) * 100;
          return (
            <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
              <div style={{ flex: 1, width: '100%', display: 'flex', flexDirection: 'column', justifyContent: 'flex-end' }}
                title={`Teden od ${w.start.toLocaleDateString('sl-SI')}: ${w.stepsDone} korakov + ${w.tasksDone} nalog + ${w.journalEntries} zapisov`}>
                <div style={{ width: '100%', background: 'var(--accent)', height: `${sH}%`, transition: 'height 0.2s ease' }} />
                <div style={{ width: '100%', background: '#0EA5E9', height: `${tH}%`, transition: 'height 0.2s ease' }} />
                <div style={{ width: '100%', background: '#A78BFA', height: `${(h - sH - tH)}%`, borderRadius: '0 0 0 0', transition: 'height 0.2s ease' }} />
              </div>
              <div className="text-xs text-3 mono" style={{ fontSize: 9 }}>
                {w.start.toLocaleDateString('sl-SI', { day: '2-digit', month: '2-digit' })}
              </div>
            </div>
          );
        })}
      </div>
      <div className="flex gap-3 text-xs" style={{ marginTop: 8 }}>
        <span className="flex gap-2" style={{ alignItems: 'center' }}><span style={{ width: 8, height: 8, borderRadius: 2, background: 'var(--accent)' }} />Koraki</span>
        <span className="flex gap-2" style={{ alignItems: 'center' }}><span style={{ width: 8, height: 8, borderRadius: 2, background: '#0EA5E9' }} />Naloge</span>
        <span className="flex gap-2" style={{ alignItems: 'center' }}><span style={{ width: 8, height: 8, borderRadius: 2, background: '#A78BFA' }} />Dnevnik</span>
      </div>
    </div>
  );
};

const FinanceTrendChart = ({ ctx }) => {
  const { state } = ctx;
  const projectsWithFinance = useMemo(() => {
    const ids = new Set(state.finances.map(f => f.projectId));
    return state.projects.filter(p => ids.has(p.id));
  }, [state.projects, state.finances]);
  const [projectId, setProjectId] = useState('');
  useEffect(() => {
    if (!projectId && projectsWithFinance.length) setProjectId(projectsWithFinance[0].id);
  }, [projectsWithFinance, projectId]);

  const items = useMemo(() =>
    state.finances.filter(f => f.projectId === projectId).slice().sort((a, b) => a.date - b.date),
    [state.finances, projectId]
  );

  if (projectsWithFinance.length === 0) {
    return (
      <div className="card">
        <h3 style={{ margin: '0 0 8px', fontSize: 13, fontWeight: 600 }}>Finance — trend</h3>
        <div className="text-3 text-sm">Dodajte finančne posnetke v projekt, da se prikaže trend.</div>
      </div>
    );
  }

  const W = 460, H = 200, P = { l: 44, r: 12, t: 12, b: 28 };
  const xs = items.map(f => f.date);
  const ys = items.flatMap(f => [f.monthlyCost || 0, f.targetRevenue || 0]);
  const xMin = Math.min(...xs, now()), xMax = Math.max(...xs, now());
  const yMax = Math.max(...ys, 1);
  const xScale = (x) => P.l + (W - P.l - P.r) * (xMax === xMin ? 0.5 : (x - xMin) / (xMax - xMin));
  const yScale = (y) => H - P.b - (H - P.t - P.b) * (y / yMax);
  const path = (key) => items.map((f, i) => `${i === 0 ? 'M' : 'L'} ${xScale(f.date).toFixed(1)} ${yScale(f[key] || 0).toFixed(1)}`).join(' ');

  return (
    <div className="card">
      <div className="row-between mb-3">
        <h3 style={{ margin: 0, fontSize: 13, fontWeight: 600 }}>Finance — trend</h3>
        <select className="select" style={{ width: 200 }} value={projectId} onChange={e => setProjectId(e.target.value)}>
          {projectsWithFinance.map(p => <option key={p.id} value={p.id}>{p.title}</option>)}
        </select>
      </div>
      {items.length === 0 ? (
        <div className="text-3 text-sm">Za izbrani projekt še ni posnetkov.</div>
      ) : (
        <>
          <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto' }} preserveAspectRatio="xMidYMid meet">
            {[0, 0.25, 0.5, 0.75, 1].map((t, i) => {
              const y = yScale(yMax * t);
              return (
                <g key={i}>
                  <line x1={P.l} y1={y} x2={W - P.r} y2={y} stroke="var(--border)" strokeDasharray={i === 0 ? '' : '2 3'} />
                  <text x={P.l - 6} y={y + 3} textAnchor="end" fontSize="9" fill="var(--text-3)" fontFamily="JetBrains Mono">
                    {Math.round(yMax * t).toLocaleString('sl-SI')}
                  </text>
                </g>
              );
            })}
            <path d={path('monthlyCost')} fill="none" stroke="var(--danger)" strokeWidth="1.6" />
            <path d={path('targetRevenue')} fill="none" stroke="var(--success)" strokeWidth="1.6" />
            {items.map(f => (
              <g key={f.id}>
                <circle cx={xScale(f.date)} cy={yScale(f.monthlyCost || 0)} r="2.5" fill="var(--danger)">
                  <title>{fmtDate(f.date)}: strošek {(f.monthlyCost || 0).toLocaleString('sl-SI')}€</title>
                </circle>
                <circle cx={xScale(f.date)} cy={yScale(f.targetRevenue || 0)} r="2.5" fill="var(--success)">
                  <title>{fmtDate(f.date)}: prihodek {(f.targetRevenue || 0).toLocaleString('sl-SI')}€</title>
                </circle>
              </g>
            ))}
          </svg>
          <div className="flex gap-3 text-xs" style={{ marginTop: 8 }}>
            <span className="flex gap-2" style={{ alignItems: 'center' }}><span style={{ width: 8, height: 8, borderRadius: 4, background: 'var(--danger)' }} />Strošek</span>
            <span className="flex gap-2" style={{ alignItems: 'center' }}><span style={{ width: 8, height: 8, borderRadius: 4, background: 'var(--success)' }} />Ciljni prihodek</span>
          </div>
        </>
      )}
    </div>
  );
};

const PortfolioRadar = ({ ctx }) => {
  const { state } = ctx;
  const scored = useMemo(() =>
    state.projects.filter(p => p.status !== 'archived' && Object.keys(p.scores || {}).length >= 4)
      .sort((a, b) => computeScore(b.scores, state.appSettings.scoreWeights) - computeScore(a.scores, state.appSettings.scoreWeights))
      .slice(0, 3),
    [state.projects, state.appSettings.scoreWeights]
  );

  if (scored.length === 0) {
    return (
      <div className="card">
        <h3 style={{ margin: '0 0 8px', fontSize: 13, fontWeight: 600 }}>Portfeljska primerjava</h3>
        <div className="text-3 text-sm">Ocenite projekte v vsaj 4 dimenzijah za primerjavo.</div>
      </div>
    );
  }

  const W = 340, R = 110, cx = W/2, cy = W/2 - 8;
  const dims = SCORE_DIMENSIONS;
  const angle = (i) => -Math.PI/2 + (i * 2 * Math.PI) / dims.length;
  const point = (val, i, r = R) => {
    const a = angle(i);
    const d = (val / 10) * r;
    return [cx + Math.cos(a) * d, cy + Math.sin(a) * d];
  };
  const colors = ['#4F46E5', '#0EA5E9', '#F59E0B'];

  return (
    <div className="card">
      <h3 style={{ margin: '0 0 12px', fontSize: 13, fontWeight: 600 }}>Portfeljska primerjava (top {scored.length})</h3>
      <div style={{ display: 'flex', justifyContent: 'center' }}>
        <svg viewBox={`0 0 ${W} ${W}`} style={{ width: '100%', maxWidth: 360 }}>
          {[0.25, 0.5, 0.75, 1].map((t, i) => (
            <circle key={i} cx={cx} cy={cy} r={R*t} fill="none" stroke="var(--border)" strokeDasharray={i === 3 ? '' : '2 3'} />
          ))}
          {dims.map((d, i) => {
            const [x, y] = point(10, i);
            const [lx, ly] = point(11.8, i);
            const ta = Math.abs(lx - cx) < 6 ? 'middle' : lx < cx ? 'end' : 'start';
            return (
              <g key={i}>
                <line x1={cx} y1={cy} x2={x} y2={y} stroke="var(--border)" />
                <text x={lx} y={ly + 3} textAnchor={ta} fontSize="9" fill="var(--text-3)" fontFamily="JetBrains Mono">
                  {d.label.split(' ')[0].slice(0, 8)}
                </text>
              </g>
            );
          })}
          {scored.map((p, idx) => {
            const pts = dims.map((d, i) => point(p.scores[d.key] || 0, i)).map(([x, y]) => `${x.toFixed(1)},${y.toFixed(1)}`).join(' ');
            return (
              <polygon key={p.id} points={pts} fill={colors[idx]} fillOpacity="0.12" stroke={colors[idx]} strokeWidth="1.5" />
            );
          })}
        </svg>
      </div>
      <div className="flex gap-3 text-xs" style={{ marginTop: 8, flexWrap: 'wrap' }}>
        {scored.map((p, i) => (
          <span key={p.id} className="flex gap-2" style={{ alignItems: 'center' }}>
            <span style={{ width: 8, height: 8, borderRadius: 4, background: colors[i] }} />
            {p.title}
          </span>
        ))}
      </div>
    </div>
  );
};

const TeamSection = ({ ctx }) => {
  const { state, update } = ctx;
  const currentWs = state.workspaces.find(w => w.id === state.currentWorkspaceId);
  const team = currentWs?.team || [];
  const [open, setOpen] = useState(false);
  const [email, setEmail] = useState('');
  const [role, setRole] = useState('edit');

  const validEmail = (e) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e.trim());

  const addMember = () => {
    if (!validEmail(email)) return;
    const member = { id: uid(), email: email.trim().toLowerCase(), role, addedAt: now() };
    update.workspaces(prev => prev.map(w => w.id === state.currentWorkspaceId
      ? { ...w, team: [...(w.team || []), member] } : w));
    setEmail(''); setOpen(false);
  };

  const removeMember = (id) => update.workspaces(prev => prev.map(w =>
    w.id === state.currentWorkspaceId ? { ...w, team: (w.team || []).filter(m => m.id !== id) } : w));

  const updateRole = (id, newRole) => update.workspaces(prev => prev.map(w =>
    w.id === state.currentWorkspaceId ? { ...w, team: (w.team || []).map(m => m.id === id ? { ...m, role: newRole } : m) } : w));

  const generateInvite = async (member) => {
    const wsId = currentWs?.id;
    const userId = state.userId;
    if (!wsId || !userId) return;
    try {
      const res = await fetch(`${WORKER_URL}/invite`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-User-Id': userId },
        body: JSON.stringify({ workspaceId: wsId, email: member.email, role: member.role }),
      });
      const data = await res.json();
      if (data.error) { alert(data.error); return; }
      const link = `https://tadjeklop.github.io/GTM/?invite=${data.token}`;
      await navigator.clipboard.writeText(link);
      alert(`Povezava za povabilo je v odložišču:\n${link}`);
    } catch (e) {
      alert('Napaka pri ustvarjanju povabila.');
    }
  };

  return (
    <div className="card mb-4">
      <div className="row-between mb-3">
        <div>
          <h3 style={{ margin: '0 0 4px', fontSize: 13, fontWeight: 600 }}>Delovna ekipa</h3>
          <p className="text-2 text-sm" style={{ margin: 0 }}>Povabite sodelavce. Vloge se uveljavijo z oblačno sinhronizacijo.</p>
        </div>
        <button className="btn btn-sm btn-primary" onClick={() => setOpen(true)}><Icon name="plus" />Povabi</button>
      </div>

      {team.length === 0 ? (
        <div className="text-3 text-sm" style={{ padding: '6px 0' }}>Ekipa je prazna. Povabite prvega sodelavca.</div>
      ) : team.map(m => {
        const roleInfo = TEAM_ROLES.find(r => r.key === m.role) || TEAM_ROLES[1];
        return (
          <div key={m.id} className="row-between" style={{ padding: '10px 0', borderBottom: '1px solid var(--border)' }}>
            <div>
              <div style={{ fontWeight: 500 }}>{m.email}</div>
              <div className="text-xs text-3 mono">Dodano {fmtDate(m.addedAt)}</div>
            </div>
            <div className="flex gap-2" style={{ alignItems: 'center' }}>
              <select className="select" style={{ width: 110 }} value={m.role}
                onChange={e => updateRole(m.id, e.target.value)}>
                {TEAM_ROLES.map(r => <option key={r.key} value={r.key}>{r.label}</option>)}
              </select>
              <button className="btn btn-sm" onClick={() => generateInvite(m)} title="Kopiraj povabilno povezavo">
                <Icon name="link" size={13} />Povabilo

              <button className="btn btn-ghost btn-icon btn-danger" onClick={() => removeMember(m.id)}>

              </button>
            </div>
          </div>
        );

      {open && (
        <Modal title="Povabi v ekipo" onClose={() => setOpen(false)} footer={
          <>
            <button className="btn btn-ghost" onClick={() => setOpen(false)}>Prekliči</button>

        }>

            <label className="label">Email naslov</label>
            <input autoFocus className="input" type="email" value={email}

          </div>
          <div className="mb-4">
            <label className="label">Vloga</label>
            <select className="select" value={role} onChange={e => setRole(e.target.value)}>
              {TEAM_ROLES.map(r => <option key={r.key} value={r.key}>{r.label} — {r.desc}</option>)}

            Po dodajanju kliknite <strong>Povabilo</strong> poleg člana — v odložišče se skopira povabilna povezava. Pošljite jo sodelavcu; ko jo odpre, se samodejno pridruži skupnemu delovnemu prostoru.
          </div>
        </Modal>
      )}
    </div>
  );
};

    const safeName = (currentWs?.name || 'workspace').replace(/[^a-z0-9-]/gi, '_');
    a.download = `podjetniski-os-${safeName}-${new Date().toISOString().slice(0, 10)}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    update.appSettings({ lastBackup: now() });
  };

  const importJson = (e) => {
    setImportErr('');
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.tags && !data.ideas && !data.projects && !data.meta) throw new Error('Neveljaven format');
        if (!confirm(`Uvoz bo prepisal podatke v trenutnem workspaceu (${currentWs?.name}). Nadaljujem?`)) return;
        const appPatch = data.appSettings || (data.meta ? { scoreWeights: data.meta.scoreWeights } : null);
        update.replaceCurrentWorkspace({
          appSettings: appPatch,
          tags: data.tags || [], ideas: data.ideas || [], projects: data.projects || [],
          contacts: data.contacts || [], tasks: data.tasks || [], reviews: data.reviews || [],
          goals: data.goals || [], finances: data.finances || [], timelines: data.timelines || {},
          deals: data.deals || [],
        });
      } catch (err) { setImportErr('Napaka: ' + err.message); }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  return (
    <div className="content narrow">
      <div className="page-h"><div><h1>Nastavitve</h1><p>Uteži za ocenjevanje, izvoz in uvoz workspaca.</p></div></div>

      <div className="card mb-4">
        <h3 style={{ margin: '0 0 4px', fontSize: 13, fontWeight: 600 }}>Uteži za sestavljeno oceno</h3>
        <p className="text-2 text-sm mb-4">Vsaki dimenziji določite pomen (0 = ignoriraj, 3 = trikratna teža).</p>
        {SCORE_DIMENSIONS.map(d => (
          <div key={d.key} className="slider-row" style={{ gridTemplateColumns: '1fr' }}>
            <div>
              <div className="label-row">
                <span>{d.label}</span>
                <span className="value">×{weights[d.key] ?? 1}</span>
              </div>
              <input type="range" min={0} max={3} step={0.5} value={weights[d.key] ?? 1}
                onChange={e => setWeights({ ...weights, [d.key]: +e.target.value })} />
            </div>
          </div>
        ))}
        <div className="flex gap-2 mt-3">
          <button className="btn" onClick={reset}>Privzete uteži</button>
          <button className="btn btn-primary" onClick={saveWeights}>Shrani uteži</button>
        </div>
      </div>

      <div className="card mb-4">
        <h3 style={{ margin: '0 0 4px', fontSize: 13, fontWeight: 600 }}>Izvoz in uvoz</h3>
        <p className="text-2 text-sm mb-3">
          Celoten workspace v eni JSON datoteki za varnostno kopijo ali prenos.
          {state.appSettings.lastBackup
            ? <> Zadnji backup: <span className="mono">{fmtRelative(state.appSettings.lastBackup)}</span>.</>
            : <> Še nimate varnostne kopije.</>}
        </p>
        <div className="flex gap-2">
          <button className="btn" onClick={exportJson}><Icon name="download" />Izvozi vse v JSON</button>
          <label className="btn"><Icon name="upload" />Uvozi iz JSON
            <input type="file" accept="application/json" onChange={importJson} style={{ display: 'none' }} />
          </label>
        </div>
        {importErr && <div className="text-sm" style={{ color: 'var(--danger)', marginTop: 8 }}>{importErr}</div>}
      </div>

      <div className="card mb-4">
        <div className="row-between mb-3">

          <button className="btn btn-sm btn-primary" onClick={() => setWsModal({ mode: 'create' })}><Icon name="plus" />Nov workspace</button>

        <p className="text-2 text-sm mb-3">Vsak workspace ima svojo množico idej, projektov, kontaktov, nalog, pregledov. Uteži ocenjevanja so deljene.</p>
        {state.workspaces.map(w => (
          <div key={w.id} className="row-between" style={{ padding: '8px 0', borderBottom: '1px solid var(--border)' }}>
