<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operativni sistem za podjetništvo</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#4F46E5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Podjetniški OS">
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%234F46E5'/><text x='16' y='22' font-family='ui-sans-serif,system-ui' font-size='16' font-weight='700' fill='white' text-anchor='middle'>OS</text></svg>">
<link rel="preconnect" href="https://rsms.me/">
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFFFFF;
    --panel: #F7F8FA;
    --panel-2: #FBFCFD;
    --border: #E4E7EC;
    --border-strong: #CBD5E1;
    --text: #0F172A;
    --text-2: #475569;
    --text-3: #94A3B8;
    --accent: #4F46E5;
    --accent-hover: #4338CA;
    --accent-soft: #EEF2FF;
    --success: #059669;
    --success-soft: #D1FAE5;
    --warn: #D97706;
    --warn-soft: #FEF3C7;
    --danger: #DC2626;
    --danger-soft: #FEE2E2;
    --info: #0284C7;
    --info-soft: #E0F2FE;
    --radius: 6px;
    --radius-lg: 8px;
    --radius-sm: 4px;
    --shadow-sm: 0 1px 2px rgba(15,23,42,0.04);
    --shadow: 0 4px 12px rgba(15,23,42,0.06);
    --shadow-lg: 0 12px 32px rgba(15,23,42,0.10);
    --font: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--font);
    font-feature-settings: "cv11", "ss01", "ss03";
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; }
  input, textarea, select { font-family: inherit; font-size: inherit; color: inherit; }
  textarea { resize: vertical; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #E4E7EC; border-radius: 999px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }

  /* Layout */
  .app { display: grid; grid-template-columns: 240px 1fr; height: 100vh; }
  .sidebar {
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 16px 12px;
    overflow-y: auto;
  }
  .sidebar-brand {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 8px 16px;
    font-weight: 600; font-size: 13px; letter-spacing: -0.01em;
  }
  .sidebar-brand .logo {
    width: 24px; height: 24px; border-radius: 5px;
    background: linear-gradient(135deg, var(--accent), #7C3AED);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-family: var(--mono); font-size: 11px; font-weight: 600;
  }
  .nav-section { margin-bottom: 8px; }
  .nav-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-3); padding: 8px; font-weight: 500;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 8px; border-radius: var(--radius);
    color: var(--text-2); font-weight: 500; font-size: 13px;
    cursor: pointer; user-select: none;
    border: none; background: transparent; width: 100%; text-align: left;
    transition: background 0.1s ease, color 0.1s ease;
  }
  .nav-item:hover { background: rgba(15,23,42,0.04); color: var(--text); }
  .nav-item.active { background: var(--bg); color: var(--text); box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
  .nav-item .count {
    margin-left: auto; font-family: var(--mono); font-size: 11px;
    color: var(--text-3); background: rgba(15,23,42,0.04);
    padding: 1px 6px; border-radius: 999px;
  }
  .nav-item.active .count { background: var(--accent-soft); color: var(--accent); }
  .nav-icon {
    width: 16px; height: 16px; flex-shrink: 0;
    color: currentColor; opacity: 0.7;
  }
  .sidebar-bottom { margin-top: auto; padding-top: 12px; border-top: 1px solid var(--border); }

  .main {
    overflow-y: auto;
    display: flex; flex-direction: column;
    min-width: 0;
  }
  .topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 24px; border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky; top: 0; z-index: 10;
  }
  .topbar h1 {
    margin: 0; font-size: 16px; font-weight: 600; letter-spacing: -0.01em;
  }
  .topbar .crumb { color: var(--text-3); font-weight: 400; }
  .topbar-spacer { flex: 1; }

  .save-indicator {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-3);
    font-family: var(--mono);
  }
  .save-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-3); }
  .save-indicator.saving .save-dot { background: var(--warn); animation: pulse 1s ease-in-out infinite; }
  .save-indicator.saved .save-dot { background: var(--success); }
  .save-indicator.error .save-dot { background: var(--danger); }
  @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

  .content { padding: 24px; flex: 1; min-width: 0; max-width: 1400px; width: 100%; }
  .content.narrow { max-width: 960px; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 7px 12px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--bg); color: var(--text);
    font-weight: 500; font-size: 13px;
    transition: background 0.1s ease, border-color 0.1s ease;
  }
  .btn:hover { background: var(--panel); border-color: var(--border-strong); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .btn-ghost { border-color: transparent; background: transparent; color: var(--text-2); }
  .btn-ghost:hover { background: rgba(15,23,42,0.04); color: var(--text); }
  .btn-danger { color: var(--danger); }
  .btn-danger:hover { background: var(--danger-soft); border-color: var(--danger); }
  .btn-sm { padding: 4px 8px; font-size: 12px; }
  .btn-lg { padding: 9px 16px; font-size: 14px; }
  .btn-icon { padding: 6px; }

  /* Inputs */
  .input, .textarea, .select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    transition: border-color 0.1s ease, box-shadow 0.1s ease;
  }
  .input:focus, .textarea:focus, .select:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,70,229,0.12);
  }
  .textarea { line-height: 1.55; min-height: 80px; }
  .label { display: block; font-size: 12px; font-weight: 500; color: var(--text-2); margin-bottom: 6px; }
  .help { font-size: 12px; color: var(--text-3); margin-top: 4px; }

  /* Cards */
  .card {
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 16px;
  }
  .card-h { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .card-h h3 { margin: 0; font-size: 13px; font-weight: 600; letter-spacing: -0.005em; }
  .card-body { padding: 16px; }
  .card-soft { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px; }

  /* Status badges */
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 2px 7px; border-radius: var(--radius-sm);
    font-size: 11px; font-weight: 500; line-height: 1.4;
    font-family: var(--mono);
    border: 1px solid transparent;
  }
  .badge::before { content: ""; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
  .badge-gray { background: #F1F5F9; color: #475569; }
  .badge-amber { background: var(--warn-soft); color: var(--warn); }
  .badge-green { background: var(--success-soft); color: var(--success); }
  .badge-slate { background: #F1F5F9; color: #64748B; }
  .badge-indigo { background: var(--accent-soft); color: var(--accent); }
  .badge-sky { background: var(--info-soft); color: var(--info); }
  .badge-red { background: var(--danger-soft); color: var(--danger); }
  .badge.no-dot::before { display: none; }

  /* Chip / tag */
  .chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 500;
    background: var(--panel); border: 1px solid var(--border);
    color: var(--text-2);
  }
  .chip-x {
    border: none; background: transparent; padding: 0 0 0 2px;
    color: var(--text-3); cursor: pointer; font-size: 13px; line-height: 1;
  }
  .chip-x:hover { color: var(--danger); }
  .chip-input { display: inline-flex; align-items: center; flex-wrap: wrap; gap: 6px;
    padding: 5px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg);
  }
  .chip-input input {
    border: none; outline: none; padding: 3px 6px; font-size: 12px;
    background: transparent; flex: 1; min-width: 80px;
  }

  /* Slider */
  .slider-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center; padding: 8px 0; }
  .slider-row .label-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
  .slider-row .label-row > span { font-size: 13px; font-weight: 500; }
  .slider-row .label-row .value {
    font-family: var(--mono); font-size: 12px; color: var(--accent); font-weight: 500;
  }
  input[type="range"] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px; background: var(--border); border-radius: 999px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; background: var(--accent);
    border-radius: 50%; cursor: pointer;
    border: 2px solid var(--bg);
    box-shadow: 0 0 0 1px var(--accent);
  }
  input[type="range"]::-moz-range-thumb {
    width: 14px; height: 14px; background: var(--accent);
    border-radius: 50%; cursor: pointer;
    border: 2px solid var(--bg);
    box-shadow: 0 0 0 1px var(--accent);
  }

  /* Tables */
  .table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .table th {
    text-align: left; font-weight: 500; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.04em; color: var(--text-3); padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .table td {
    padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle;
  }
  .table tbody tr { cursor: pointer; transition: background 0.1s ease; }
  .table tbody tr:hover { background: var(--panel-2); }
  .table tbody tr:last-child td { border-bottom: none; }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(15,23,42,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 24px;
    animation: fadeIn 0.15s ease-out;
  }
  .modal {
    background: var(--bg); border-radius: var(--radius-lg); max-width: 640px; width: 100%;
    max-height: 90vh; overflow: hidden; display: flex; flex-direction: column;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.2s ease-out;
  }
  .modal-lg { max-width: 880px; }
  .modal-h { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; }
  .modal-h h2 { margin: 0; font-size: 15px; font-weight: 600; }
  .modal-h .close { margin-left: auto; }
  .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
  .modal-f { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* Page headings */
  .page-h {
    display: flex; align-items: flex-start; gap: 12px;
    margin-bottom: 20px;
  }
  .page-h h1 { margin: 0; font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
  .page-h p { margin: 4px 0 0; color: var(--text-2); font-size: 13px; }
  .page-h-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }

  /* Grids */
  .grid { display: grid; gap: 16px; }
  .grid-2 { grid-template-columns: repeat(2, 1fr); }
  .grid-3 { grid-template-columns: repeat(3, 1fr); }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }
  .flex { display: flex; }
  .gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; }
  .mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; } .mt-6 { margin-top: 24px; }
  .mb-2 { margin-bottom: 8px; } .mb-3 { margin-bottom: 12px; } .mb-4 { margin-bottom: 16px; }
  .text-sm { font-size: 12px; }
  .text-xs { font-size: 11px; }
  .text-2 { color: var(--text-2); }
  .text-3 { color: var(--text-3); }
  .mono { font-family: var(--mono); }
  .stretch { width: 100%; }

  /* Empty state */
  .empty {
    padding: 48px 20px; text-align: center; color: var(--text-2);
    border: 1px dashed var(--border); border-radius: var(--radius-lg);
    background: var(--panel-2);
  }
  .empty h3 { margin: 0 0 4px; font-size: 14px; color: var(--text); }
  .empty p { margin: 0 0 16px; font-size: 13px; }

  /* Project header */
  .proj-header {
    display: grid; grid-template-columns: 1fr auto; gap: 16px; align-items: start;
    padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--bg);
  }
  .proj-header h1 { margin: 0; font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }

  /* Phase rail */
  .phase-rail {
    display: flex; gap: 4px; overflow-x: auto;
    padding: 14px 24px; background: var(--panel-2); border-bottom: 1px solid var(--border);
  }
  .phase-pill {
    flex-shrink: 0; padding: 7px 12px; border-radius: var(--radius);
    background: var(--bg); border: 1px solid var(--border);
    font-size: 12px; font-weight: 500; color: var(--text-2);
    cursor: pointer; transition: all 0.1s ease;
    display: flex; align-items: center; gap: 6px;
    white-space: nowrap;
  }
  .phase-pill:hover { border-color: var(--border-strong); color: var(--text); }
  .phase-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .phase-pill .phase-num { font-family: var(--mono); font-size: 11px; opacity: 0.7; }
  .phase-pill .progress {
    font-family: var(--mono); font-size: 10px; opacity: 0.7;
  }

  /* Step list */
  .step {
    border: 1px solid var(--border); border-radius: var(--radius-lg);
    margin-bottom: 12px; background: var(--bg); overflow: hidden;
  }
  .step-h {
    padding: 12px 14px; display: flex; align-items: center; gap: 10px;
    cursor: pointer; user-select: none;
  }
  .step-h:hover { background: var(--panel-2); }
  .step-num {
    width: 22px; height: 22px; border-radius: 5px; background: var(--panel);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 11px; color: var(--text-2);
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .step-title { font-weight: 500; flex: 1; }
  .step-body { padding: 0 14px 14px; border-top: 1px solid var(--border); padding-top: 14px; background: var(--panel-2); }
  .step-desc { color: var(--text-2); font-size: 13px; margin-bottom: 12px; }
  .prompts { padding-left: 18px; margin: 0 0 12px; color: var(--text-2); font-size: 13px; }
  .prompts li { margin-bottom: 4px; }

  /* Timeline */
  .timeline-entry {
    border-left: 2px solid var(--border);
    padding: 8px 14px; margin-left: 8px;
    position: relative;
  }
  .timeline-entry::before {
    content: ""; position: absolute; left: -5px; top: 14px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--bg); border: 2px solid var(--border-strong);
  }
  .timeline-entry.decision::before { background: var(--accent); border-color: var(--accent); }
  .timeline-meta {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--text-3); font-family: var(--mono); margin-bottom: 4px;
  }
  .timeline-body { font-size: 13px; line-height: 1.55; white-space: pre-wrap; }
  .timeline-rationale {
    margin-top: 6px; padding: 8px 10px; background: var(--accent-soft);
    border-radius: var(--radius-sm); font-size: 12px; color: var(--accent);
  }

  /* Scatter */
  .scatter {
    position: relative; width: 100%; aspect-ratio: 1.6/1; background: var(--panel-2);
    border: 1px solid var(--border); border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .scatter-axis { position: absolute; color: var(--text-3); font-size: 10px; font-family: var(--mono); }
  .scatter-dot {
    position: absolute; width: 12px; height: 12px; border-radius: 50%;
    transform: translate(-50%, -50%); cursor: pointer;
    border: 2px solid var(--bg); transition: transform 0.1s ease;
  }
  .scatter-dot:hover { transform: translate(-50%, -50%) scale(1.4); z-index: 2; }
  .scatter-grid {
    position: absolute; inset: 24px;
    background-image: linear-gradient(var(--border) 1px, transparent 1px),
                      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 25% 25%;
    opacity: 0.4;
  }

  /* Onboarding */
  .onboard-step { padding: 12px 0; }
  .onboard-step h4 { margin: 0 0 4px; font-size: 13px; font-weight: 600; color: var(--text); }
  .onboard-step p { margin: 0; color: var(--text-2); font-size: 13px; }

  /* Responsive */
  @media (max-width: 880px) {
    .app { grid-template-columns: 1fr; }
    .sidebar {
      position: fixed; inset: 0 auto 0 0; width: 80%; max-width: 280px;
      z-index: 30; transform: translateX(-100%); transition: transform 0.2s ease;
      box-shadow: var(--shadow-lg);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-backdrop {
      position: fixed; inset: 0; background: rgba(15,23,42,0.4); z-index: 29;
    }
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
    .content { padding: 16px; }
    .topbar { padding: 12px 16px; }
    .proj-header { padding: 14px 16px; }
    .phase-rail { padding: 12px 16px; }
  }
  .menu-toggle {
    display: none; background: transparent; border: none; padding: 6px;
    color: var(--text);
  }
  @media (max-width: 880px) { .menu-toggle { display: inline-flex; } }

  /* Utility */
  .clickable { cursor: pointer; }
  .sep { height: 1px; background: var(--border); margin: 12px 0; }
  .pill-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .kpi {
    padding: 14px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg);
  }
  .kpi .v { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
  .kpi .l { color: var(--text-3); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
  .row-between { display: flex; justify-content: space-between; align-items: center; }

  /* Search highlights */
  mark.hl { background: #FEF08A; color: var(--text); padding: 0 2px; border-radius: 2px; }

  /* Progress bar */
  .progress-bar {
    height: 4px; background: var(--border); border-radius: 999px; overflow: hidden;
  }
  .progress-bar > div { height: 100%; background: var(--accent); transition: width 0.2s ease; }

  /* Backup banner */
  .backup-banner {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; background: var(--warn-soft); border-bottom: 1px solid #FCD34D;
    color: #92400E; font-size: 13px;
  }
  .backup-banner.danger {
    background: var(--danger-soft); border-bottom-color: #FCA5A5; color: #991B1B;
  }
  .backup-banner .btn { background: var(--bg); border-color: var(--border); color: var(--text); }
  .backup-banner .btn:hover { background: var(--panel); }
  .backup-banner .close-x {
    margin-left: 8px; background: transparent; border: none; color: inherit; cursor: pointer; opacity: 0.6; padding: 4px;
  }
  .backup-banner .close-x:hover { opacity: 1; }

  /* Entity links */
  .entity-link {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px dotted var(--accent);
    cursor: pointer;
    padding: 0 1px;
  }
  .entity-link:hover { background: var(--accent-soft); border-bottom-style: solid; }
  .entity-link.broken {
    color: var(--text-3);

(function() {

        navigator.serviceWorker.getRegistrations().then(function(regs) { return Promise.all(regs.map(function(r) { return r.unregister(); })); })

    try {

        return v ? JSON.parse(v) : null;

        await window.storage.setItem(key, s, { shared: false });

/* -------------------- STATE / STORAGE -------------------- */
const WS_SUFFIXES = ['tags', 'ideas', 'projects', 'contacts', 'tasks', 'reviews', 'goals', 'finances', 'timelines', 'deals'];
const wsKey = (wsId, suffix) => `ws:${wsId}:${suffix}`;

const INITIAL_STATE = {
  appSettings: { scoreWeights: { ...DEFAULT_WEIGHTS }, onboardingComplete: false, lastBackup: null },
  workspaces: [],
  currentWorkspaceId: null,
  userId: null,
  tags: [], ideas: [], projects: [],
  contacts: [], tasks: [], reviews: [],
  goals: [], finances: [], timelines: {}, deals: [],
};

const loadWorkspaceData = async (wsId) => {
  const results = await Promise.all(WS_SUFFIXES.map(s => storage.get(wsKey(wsId, s))));
  const data = {};
  WS_SUFFIXES.forEach((s, i) => {
    data[s] = results[i] || (s === 'timelines' ? {} : []);
  });
  return data;
};

const loadAll = async () => {
  let workspaces = await storage.get('app:workspaces');
  let appSettings = await storage.get('app:settings');
  let currentWorkspaceId = await storage.get('app:current_workspace');

  if (!workspaces) {
    // Try migration from old single-workspace layout
    const oldMeta = await storage.get('workspace:meta');
    const defaultWs = { id: uid(), name: 'Glavni', createdAt: (oldMeta && oldMeta.createdAt) || now(), team: [] };
    workspaces = [defaultWs];
    currentWorkspaceId = defaultWs.id;
    appSettings = {
      scoreWeights: (oldMeta && oldMeta.scoreWeights) || { ...DEFAULT_WEIGHTS },
      onboardingComplete: (oldMeta && oldMeta.onboardingComplete) || false,
      lastBackup: null,
    };
    const oldMap = [
      ['tags:all', 'tags'], ['ideas:all', 'ideas'], ['projects:all', 'projects'],
      ['contacts:all', 'contacts'], ['tasks:all', 'tasks'], ['reviews:all', 'reviews'],
      ['goals:all', 'goals'], ['finances:all', 'finances'], ['timelines:all', 'timelines'],
    ];
    for (const [oldKey, newSuffix] of oldMap) {
      const v = await storage.get(oldKey);
      if (v) await storage.set(wsKey(defaultWs.id, newSuffix), v);
    }
    await storage.set('app:workspaces', workspaces);
    await storage.set('app:settings', appSettings);
    await storage.set('app:current_workspace', currentWorkspaceId);
  }

  if (!currentWorkspaceId || !workspaces.find(w => w.id === currentWorkspaceId)) {
    currentWorkspaceId = workspaces[0].id;
    await storage.set('app:current_workspace', currentWorkspaceId);
  }

  // Persistent user identity for cloud sync
  let userId = await storage.get('app:userId');
  if (!userId) {
    userId = 'u_' + uid();
    await storage.set('app:userId', userId);
  }

  // Try cloud pull — use if newer than local
  let wsData = await loadWorkspaceData(currentWorkspaceId);
  try {
    const res = await fetch(`${WORKER_URL}/workspace/${currentWorkspaceId}`, {
      headers: { 'X-User-Id': userId },
    });
    if (res.ok) {
      const cloud = await res.json();
      const cloudTs = cloud.updatedAt || 0;
      const localTs = (wsData.projects || []).reduce((m, p) => Math.max(m, p.updatedAt || 0), 0);
      if (cloudTs > localTs) {
        // Cloud is newer — use it and write back to local
        const merged = {};
        WS_SUFFIXES.forEach(s => {
          merged[s] = cloud[s] !== undefined ? cloud[s] : (s === 'timelines' ? {} : []);
        });
        for (const [s, v] of Object.entries(merged)) {
          await storage.set(wsKey(currentWorkspaceId, s), v);
        }
        wsData = merged;
      }
    }
  } catch (_) { /* offline — local data is fine */ }

  return { appSettings, workspaces, currentWorkspaceId, userId, ...wsData };
};

const saveSlice = async (key, value) => storage.set(key, value);

/* -------------------- HELPERS -------------------- */
const ensureTag = (tags, name) => {
  const n = name.trim().toLowerCase();
  const existing = tags.find(t => t.name.toLowerCase() === n);
  if (existing) return { tags, tagId: existing.id };
  const palette = ['#4F46E5','#0EA5E9','#10B981','#F59E0B','#EF4444','#8B5CF6','#EC4899','#14B8A6','#84CC16','#F97316'];
  const tag = { id: uid(), name: name.trim(), color: palette[tags.length % palette.length] };
  return { tags: [...tags, tag], tagId: tag.id };
};

const computeScore = (scores, weights) => {
  if (!scores) return 0;
  let sum = 0, w = 0;
  SCORE_DIMENSIONS.forEach(d => {
    const v = scores[d.key];
    const wt = weights[d.key] || 1;
    if (typeof v === 'number') { sum += v * wt; w += wt; }
  });
  return w ? +(sum / w).toFixed(2) : 0;
};

const projectProgress = (project) => {
  if (!project || !project.phases) return 0;
  const all = project.phases.flatMap(p => p.steps);
  if (!all.length) return 0;
  const done = all.filter(s => s.status === 'completed').length;
  return Math.round((done / all.length) * 100);
};

const LINK_RE = /\[\[([^\]]+)\]\]/g;

const findEntityByName = (state, name) => {
  const lower = name.toLowerCase().trim();
  const p = state.projects.find(x => (x.title || '').toLowerCase() === lower);
  if (p) return { type: 'project', id: p.id, title: p.title };
  const i = state.ideas.find(x => (x.title || '').toLowerCase() === lower);
  if (i) return { type: 'idea', id: i.id, title: i.title };
  const c = state.contacts.find(x => (x.name || '').toLowerCase() === lower);
  if (c) return { type: 'contact', id: c.id, title: c.name };
  return null;
};

const navigateEntity = (ctx, ent) => {
  if (ent.type === 'project') ctx.setView({ name: 'project', id: ent.id });
  else if (ent.type === 'idea') ctx.setView({ name: 'ideas', selectIdea: ent.id });
  else if (ent.type === 'contact') ctx.setView({ name: 'contacts' });
};

const LinkedText = ({ text, ctx }) => {
  if (!text) return null;
  const parts = [];
  let last = 0;
  const re = /\[\[([^\]]+)\]\]/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) parts.push({ kind: 'text', value: text.slice(last, m.index) });
    const ent = findEntityByName(ctx.state, m[1]);
    parts.push({ kind: 'link', name: m[1], entity: ent });
    last = m.index + m[0].length;
  }
  if (last < text.length) parts.push({ kind: 'text', value: text.slice(last) });
  return (
    <>
      {parts.map((p, i) => {
        if (p.kind === 'text') return <span key={i}>{p.value}</span>;
        if (p.entity) {
          return <a key={i} className="entity-link" onClick={() => navigateEntity(ctx, p.entity)}>{p.entity.title}</a>;
        }
        return <span key={i} className="entity-link broken" title="Povezana entiteta še ne obstaja">[[{p.name}]]</span>;
      })}
    </>
  );
};

  <div className="link-hint">Namig: pišite <code>[[Ime projekta]]</code>, <code>[[Ime ideje]]</code> ali <code>[[Ime osebe]]</code> za povezave.</div>
);

const computeBacklinks = (state, targetType, targetId) => {
  const target = targetType === 'project' ? state.projects.find(p => p.id === targetId)
    : targetType === 'idea' ? state.ideas.find(i => i.id === targetId)
    : state.contacts.find(c => c.id === targetId);
  if (!target) return [];
  const name = ((target.title || target.name) || '').toLowerCase().trim();
  if (!name) return [];
  const refs = [];
  const matches = (text) => {
    if (!text) return false;
    const re = /\[\[([^\]]+)\]\]/g;
    let m;
    while ((m = re.exec(text)) !== null) {
      if (m[1].toLowerCase().trim() === name) return true;
    }
    return false;
  };
  const add = (ref) => {
    const k = `${ref.type}:${ref.id}:${ref.where}`;
    if (!refs.find(r => `${r.type}:${r.id}:${r.where}` === k)) refs.push(ref);
  };
  state.projects.forEach(p => {
    if (p.id === targetId && targetType === 'project') return;
    if (matches(p.summary)) add({ type: 'project', id: p.id, title: p.title, where: 'povzetek' });
    if (matches(p.icp)) add({ type: 'project', id: p.id, title: p.title, where: 'ICP' });
    p.phases.forEach(ph => ph.steps.forEach(s => {
      if (matches(s.response)) add({ type: 'project', id: p.id, title: p.title, where: `${ph.title} / ${s.title}` });
      (s.comments || []).forEach(c => { if (matches(c.body)) add({ type: 'project', id: p.id, title: p.title, where: `${ph.title} / ${s.title} (komentar)` }); });
    }));
    (p.hypotheses || []).forEach(h => { if (matches(h.statement)) add({ type: 'project', id: p.id, title: p.title, where: `hipoteza` }); });
    (p.experiments || []).forEach(e => {
      if (matches(e.method) || matches(e.successCriteria) || matches(e.result) || matches(e.learning))
        add({ type: 'project', id: p.id, title: p.title, where: 'eksperiment' });
    });
    (state.timelines[p.id] || []).forEach(e => {
      if (matches(e.body) || matches(e.decisionRationale))
        add({ type: 'project', id: p.id, title: p.title, where: e.kind === 'decision' ? 'dnevnik (odločitev)' : 'dnevnik' });
    });
  });
  state.ideas.forEach(i => {
    if (i.id === targetId && targetType === 'idea') return;
    if (matches(i.description)) add({ type: 'idea', id: i.id, title: i.title, where: 'opis' });
    (i.comments || []).forEach(c => { if (matches(c.body)) add({ type: 'idea', id: i.id, title: i.title, where: 'komentar' }); });
  });
  state.contacts.forEach(c => {
    if (c.id === targetId && targetType === 'contact') return;
    if (matches(c.notes)) add({ type: 'contact', id: c.id, title: c.name, where: 'opombe' });
    (c.interactions || []).forEach(it => { if (matches(it.summary)) add({ type: 'contact', id: c.id, title: c.name, where: `interakcija (${fmtDate(it.date)})` }); });
  });
  state.deals.forEach(d => {
    if (matches(d.notes)) add({ type: 'deal', id: d.id, title: d.title, where: 'deal' });
  });
  state.reviews.forEach(r => {
    if (matches(r.wins) || matches(r.blockers) || matches(r.nextFocus))
      add({ type: 'review', id: r.id, title: `Pregled ${fmtDate(r.date)}`, where: r.cadence });
  });
  return refs;
};

const Backlinks = ({ targetType, targetId, ctx }) => {
  const backlinks = useMemo(() => computeBacklinks(ctx.state, targetType, targetId), [ctx.state, targetType, targetId]);
  if (backlinks.length === 0) {
    return <div className="text-3 text-sm">Še ni povezav. Drugod uporabite <code style={{ fontFamily: 'var(--mono)', background: 'var(--panel)', padding: '1px 4px', borderRadius: 3 }}>[[ime]]</code>, da se pojavi tu.</div>;
  }
  return (
    <div>
      {backlinks.map((b, i) => (
        <div key={i} className="backlink-item" onClick={() => {
          if (b.type === 'project') ctx.setView({ name: 'project', id: b.id });
          else if (b.type === 'idea') ctx.setView({ name: 'ideas', selectIdea: b.id });
          else if (b.type === 'contact') ctx.setView({ name: 'contacts' });
          else if (b.type === 'deal') ctx.setView({ name: 'pipeline' });
          else if (b.type === 'review') ctx.setView({ name: 'reviews' });
        }}>
          <Badge kind={b.type === 'project' ? 'badge-indigo' : b.type === 'idea' ? 'badge-amber' : b.type === 'contact' ? 'badge-sky' : b.type === 'deal' ? 'badge-green' : 'badge-gray'}>
            {b.type === 'project' ? 'Projekt' : b.type === 'idea' ? 'Ideja' : b.type === 'contact' ? 'Kontakt' : b.type === 'deal' ? 'Deal' : 'Pregled'}
          </Badge>
          <span style={{ fontWeight: 500 }}>{b.title}</span>
          <span className="text-xs text-3">/ {b.where}</span>
          <Icon name="chevronRight" className="" />
        </div>
      ))}
    </div>
  );
};

const TagInput = ({ value = [], tags, onChange, onCreate }) => {
  const [input, setInput] = useState('');
  const [open, setOpen] = useState(false);
  const ref = useRef();
  const suggestions = tags.filter(t => !value.includes(t.id) && t.name.toLowerCase().includes(input.toLowerCase())).slice(0, 6);
  const add = (id) => { onChange([...value, id]); setInput(''); };
  const remove = (id) => onChange(value.filter(v => v !== id));
  const submit = (e) => {
    if (e.key === 'Enter' && input.trim()) {
      e.preventDefault();
      const exists = tags.find(t => t.name.toLowerCase() === input.trim().toLowerCase());
      if (exists) add(exists.id);
      else onCreate(input.trim(), (id) => onChange([...value, id]));
      setInput('');
    } else if (e.key === 'Backspace' && !input && value.length) {
      remove(value[value.length - 1]);
    }
  };
  return (
    <div style={{ position: 'relative' }}>
      <div className="chip-input" onClick={() => ref.current?.focus()}>
        {value.map(id => {
          const t = tags.find(x => x.id === id);
          if (!t) return null;
          return (
            <span key={id} className="chip" style={{ borderColor: t.color, color: t.color }}>
              {t.name}
              <button className="chip-x" onClick={() => remove(id)}>×</button>
            </span>
          );
        })}
        <input ref={ref} value={input} placeholder="Dodaj oznako..."
          onChange={e => setInput(e.target.value)} onKeyDown={submit}
          onFocus={() => setOpen(true)} onBlur={() => setTimeout(() => setOpen(false), 150)} />
      </div>
      {open && suggestions.length > 0 && (
        <div style={{ position: 'absolute', top: '100%', left: 0, right: 0, marginTop: 4, background: 'var(--bg)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', zIndex: 5, boxShadow: 'var(--shadow)', padding: 4 }}>
          {suggestions.map(t => (
            <div key={t.id} className="nav-item" onMouseDown={() => add(t.id)}>
              <span style={{ width: 8, height: 8, borderRadius: 4, background: t.color }} />
              {t.name}
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

/* -------------------- APP ROOT -------------------- */
const App = () => {
  const [state, setState] = useState(INITIAL_STATE);
  const [loaded, setLoaded] = useState(false);
  const [saveStatus, setSaveStatus] = useState('idle');
  const [view, setView] = useState({ name: 'dashboard' });
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [searchOverlay, setSearchOverlay] = useState(false);
  const [quickModal, setQuickModal] = useState(null);
  const [deferredInstall, setDeferredInstall] = useState(null);

  /* PWA: register SW + capture install prompt */
  useEffect(() => {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
    const onInstall = (e) => { e.preventDefault(); setDeferredInstall(e); };
    window.addEventListener('beforeinstallprompt', onInstall);
    const onInstalled = () => setDeferredInstall(null);
    window.addEventListener('appinstalled', onInstalled);
    return () => {
      window.removeEventListener('beforeinstallprompt', onInstall);
      window.removeEventListener('appinstalled', onInstalled);
    };
  }, []);

  const triggerInstall = async () => {
    if (!deferredInstall) return;
    try {
      deferredInstall.prompt();
      await deferredInstall.userChoice;
    } catch (e) {}
    setDeferredInstall(null);
  };

  /* Load on mount */
  useEffect(() => {
    loadAll().then(s => { setState(s); setLoaded(true); });
  }, []);

  /* Keep a ref to current state so async callbacks can read it */
  const stateRef = useRef(null);
  useEffect(() => { stateRef.current = state; }, [state]);

  /* Handle ?invite=TOKEN on first load */
  useEffect(() => {
    if (!loaded) return;
    const params = new URLSearchParams(window.location.search);
    const token = params.get('invite');
    if (!token) return;
    const userId = stateRef.current?.userId;
    if (!userId) return;
    fetch(`${WORKER_URL}/join/${token}`, { headers: { 'X-User-Id': userId } })
      .then(r => r.json())
      .then(data => {
        if (data.error) { alert(data.error); return; }
        const ws = { id: data.workspaceId, name: data.workspace?.name || 'Skupno', createdAt: Date.now(), team: data.workspace?.team || [] };
        setState(s => {
          const alreadyHas = s.workspaces.find(w => w.id === data.workspaceId);
          const newList = alreadyHas ? s.workspaces : [...s.workspaces, ws];
          storage.set('app:workspaces', newList);
          storage.set('app:current_workspace', data.workspaceId);
          WS_SUFFIXES.forEach(suf => storage.set(wsKey(data.workspaceId, suf), data.workspace?.[suf] ?? (suf === 'timelines' ? {} : [])));
          return { ...s, workspaces: newList, currentWorkspaceId: data.workspaceId, ...Object.fromEntries(WS_SUFFIXES.map(suf => [suf, data.workspace?.[suf] ?? (suf === 'timelines' ? {} : [])])) };
        });
        const url = new URL(window.location.href);
        url.searchParams.delete('invite');
        window.history.replaceState({}, '', url);
      })
      .catch(() => {});
  }, [loaded]);

  /* Debounced save — track changed slices */
  const savePending = useRef({});
  const flushSaves = useRef(debounce(async () => {
    const pending = savePending.current;
    savePending.current = {};
    setSaveStatus('saving');
    try {
      const results = await Promise.all(Object.entries(pending).map(([k, v]) => saveSlice(k, v)));
      setSaveStatus(results.every(Boolean) ? 'saved' : 'error');
      setTimeout(() => setSaveStatus(s => s === 'saved' ? 'idle' : s), 1500);
      // Push to cloud after local save succeeds
      const s = stateRef.current;
      if (s?.userId && s.currentWorkspaceId) {
        const payload = {};
        WS_SUFFIXES.forEach(suf => { payload[suf] = s[suf]; });
        fetch(`${WORKER_URL}/workspace/${s.currentWorkspaceId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'X-User-Id': s.userId },
          body: JSON.stringify(payload),
        }).catch(() => {});
      }
    } catch (e) { setSaveStatus('error'); }
  }, 400)).current;

  const persistSlice = (key, value) => {
    savePending.current[key] = value;
    flushSaves();
  };

  /* Per-slice updaters — persist with workspace-scoped keys */
  const makeUpdater = (suffix) => (fn) => setState(s => {
    const next = fn(s[suffix]);
    persistSlice(wsKey(s.currentWorkspaceId, suffix), next);
    return { ...s, [suffix]: next };
  });

  const update = useMemo(() => ({
    appSettings: (patch) => setState(s => { const next = { ...s.appSettings, ...patch }; persistSlice('app:settings', next); return { ...s, appSettings: next }; }),
    workspaces: (fn) => setState(s => { const next = fn(s.workspaces); persistSlice('app:workspaces', next); return { ...s, workspaces: next }; }),
    tags: makeUpdater('tags'),
    ideas: makeUpdater('ideas'),
    projects: makeUpdater('projects'),
    contacts: makeUpdater('contacts'),
    tasks: makeUpdater('tasks'),
    reviews: makeUpdater('reviews'),
    goals: makeUpdater('goals'),
    finances: makeUpdater('finances'),
    deals: makeUpdater('deals'),
    timeline: (projectId, fn) => setState(s => {
      const cur = s.timelines[projectId] || [];
      const nextList = fn(cur);
      const next = { ...s.timelines, [projectId]: nextList };
      persistSlice(wsKey(s.currentWorkspaceId, 'timelines'), next);
      return { ...s, timelines: next };
    }),
    replaceCurrentWorkspace: (data) => {
      setState(s => {
        const wsId = s.currentWorkspaceId;
        const next = { ...s };
        WS_SUFFIXES.forEach(suf => {
          next[suf] = data[suf] !== undefined ? data[suf] : (suf === 'timelines' ? {} : []);
          persistSlice(wsKey(wsId, suf), next[suf]);
        });
        if (data.appSettings) {
          next.appSettings = { ...s.appSettings, ...data.appSettings };
          persistSlice('app:settings', next.appSettings);
        }
        return next;
      });
    },
  }), []);

  /* Workspace management */
  const switchWorkspace = async (wsId) => {
    if (wsId === state.currentWorkspaceId) return;
    await storage.set('app:current_workspace', wsId);
    const wsData = await loadWorkspaceData(wsId);
    setState(s => ({ ...s, currentWorkspaceId: wsId, ...wsData }));
    setView({ name: 'dashboard' });
  };

  const createWorkspace = async (name) => {
    const ws = { id: uid(), name: name.trim() || 'Brez naslova', createdAt: now(), team: [] };
    const newList = [...state.workspaces, ws];
    await storage.set('app:workspaces', newList);
    await storage.set('app:current_workspace', ws.id);
    const empty = {};
    WS_SUFFIXES.forEach(s => empty[s] = s === 'timelines' ? {} : []);
    setState(s => ({ ...s, workspaces: newList, currentWorkspaceId: ws.id, ...empty }));
    setView({ name: 'dashboard' });
  };

  const renameWorkspace = (wsId, name) => {
    update.workspaces(prev => prev.map(w => w.id === wsId ? { ...w, name: name.trim() || w.name } : w));
  };

  const deleteWorkspace = async (wsId) => {
    if (state.workspaces.length <= 1) return;
    for (const suffix of WS_SUFFIXES) await storage.remove(wsKey(wsId, suffix));
    const remaining = state.workspaces.filter(w => w.id !== wsId);
    await storage.set('app:workspaces', remaining);
    if (state.currentWorkspaceId === wsId) {
      const next = remaining[0].id;
      await storage.set('app:current_workspace', next);
      const wsData = await loadWorkspaceData(next);
      setState(s => ({ ...s, workspaces: remaining, currentWorkspaceId: next, ...wsData }));
      setView({ name: 'dashboard' });
    } else {
      setState(s => ({ ...s, workspaces: remaining }));
    }
  };

  /* Helpers exposed to children */
  const ctx = {
    state, update, view, setView, saveStatus,
    switchWorkspace, createWorkspace, renameWorkspace, deleteWorkspace,
    createTag: (name, cb) => {
      let createdId = null;
      update.tags(prev => {
        const { tags, tagId } = ensureTag(prev, name);
        createdId = tagId;
        return tags;
      });
      setTimeout(() => cb && createdId && cb(createdId), 0);
    },
    promoteIdea: (idea, templateKey = 'service') => {
      const projectId = uid();
      const newProject = {
        id: projectId,
        title: idea.title,
        summary: idea.description || '',
        status: 'active',
        tags: idea.tags || [],
        scores: idea.scores || {},
        icp: '',
        templateKey,
        currentPhaseKey: 0,
        createdAt: now(),
        updatedAt: now(),
        promotedFromIdeaId: idea.id,
        phases: buildPhases(templateKey),
        hypotheses: [],
        experiments: [],
      };
      update.projects(prev => [...prev, newProject]);
      update.ideas(prev => prev.map(i => i.id === idea.id ? { ...i, status: 'promoted', promotedToProjectId: projectId, updatedAt: now() } : i));
      // copy idea timeline comments to project timeline as history
      const ideaEntries = (idea.comments || []).map(c => ({
        id: uid(), kind: 'comment', body: `[Iz ideje] ${c.body}`,
        scope: { type: 'project', id: projectId }, createdAt: c.createdAt,
      }));
      if (ideaEntries.length) {
        update.timeline(projectId, prev => [...ideaEntries, ...prev]);
      }
      // add a journal marker
      update.timeline(projectId, prev => [
        { id: uid(), kind: 'decision', body: `Ideja »${idea.title}« promovirana v projekt.`, decisionRationale: 'Promocija iz idejne škatle.', createdAt: now() },
        ...prev,
      ]);
      setView({ name: 'project', id: projectId });
    },
  };

  /* Keyboard shortcuts */
  useEffect(() => {
    const k = (e) => {
      const t = e.target;
      const inField = t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable);
      // Cmd/Ctrl+K — global search, works anywhere
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault(); setSearchOverlay(true); return;
      }
      // Cmd/Ctrl+Enter in fields — submit closest form
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter' && inField) {
        const form = t.closest('form');
        if (form) { e.preventDefault(); form.requestSubmit(); }
        return;
      }
      if (inField) return;
      if (e.key === '/') { e.preventDefault(); setSearchOverlay(true); }
      else if (e.key === 'n' || e.key === 'N') { e.preventDefault(); setQuickModal('idea'); }
      else if (e.key === 't' || e.key === 'T') { e.preventDefault(); setQuickModal('task'); }
      else if (e.key === 'j' || e.key === 'J') { e.preventDefault(); setQuickModal('journal'); }
      else if (e.key === '?') { e.preventDefault(); setQuickModal('help'); }
    };
    window.addEventListener('keydown', k);
    return () => window.removeEventListener('keydown', k);
  }, []);

  const handleFabAction = (key) => {
    if (key === 'search') setSearchOverlay(true);
    else setQuickModal(key);
  };

  if (!loaded) return <div style={{ padding: 40, color: 'var(--text-3)' }}>Nalaganje…</div>;

  const showOnboarding = !state.appSettings.onboardingComplete && state.ideas.length === 0 && state.projects.length === 0;

  return (
    <div className="app">
      {sidebarOpen && <div className="sidebar-backdrop" onClick={() => setSidebarOpen(false)} />}
      <Sidebar ctx={ctx} open={sidebarOpen} close={() => setSidebarOpen(false)} openSearch={() => setSearchOverlay(true)} />
      <div className="main">
        <BackupBanner ctx={ctx} deferredInstall={deferredInstall} onInstall={triggerInstall} />
        <Topbar ctx={ctx} onMenu={() => setSidebarOpen(true)} />
        <MainView ctx={ctx} />
      </div>
      {showOnboarding && <Onboarding ctx={ctx} />}
      {searchOverlay && <SearchOverlay ctx={ctx} onClose={() => setSearchOverlay(false)} />}
      <QuickCaptureFAB onAction={handleFabAction} />
      <nav className="mobile-nav">
        {[
          { icon: 'home', label: 'Home', name: 'dashboard' },
          { icon: 'lightbulb', label: 'Ideje', name: 'ideas' },
          { icon: 'folder', label: 'Projekti', name: 'projects' },
          { icon: 'coins', label: 'Pipeline', name: 'pipeline' },
          { icon: 'task', label: 'Naloge', name: 'tasks' },
        ].map(item => (
          <button key={item.name} className={`mobile-nav-item ${view.name === item.name ? 'active' : ''}`}
            onClick={() => setView({ name: item.name })}>
            <Icon name={item.icon} size={18} />
            <span>{item.label}</span>
          </button>
        ))}
      </nav>
      {quickModal === 'idea' && <QuickIdeaModal ctx={ctx} onClose={() => setQuickModal(null)} />}
      {quickModal === 'task' && <QuickTaskModal ctx={ctx} onClose={() => setQuickModal(null)} />}
      {quickModal === 'journal' && <QuickJournalModal ctx={ctx} onClose={() => setQuickModal(null)} />}
      {quickModal === 'help' && <ShortcutsHelp onClose={() => setQuickModal(null)} />}
    </div>
  );
};

/* -------------------- WORKSPACE SWITCHER -------------------- */
const WorkspaceSwitcher = ({ ctx }) => {
  const { state, switchWorkspace, setView } = ctx;
  const [open, setOpen] = useState(false);
  const current = state.workspaces.find(w => w.id === state.currentWorkspaceId);
  useEffect(() => {
    if (!open) return;
    const onDown = (e) => { if (!e.target.closest('.ws-switcher')) setOpen(false); };
    const onKey = (e) => e.key === 'Escape' && setOpen(false);
    window.addEventListener('mousedown', onDown);
    window.addEventListener('keydown', onKey);
    return () => { window.removeEventListener('mousedown', onDown); window.removeEventListener('keydown', onKey); };
  }, [open]);
  const initial = (current?.name || 'W').slice(0, 2).toUpperCase();
  return (
    <div className="ws-switcher">
      <button className="ws-btn" onClick={() => setOpen(o => !o)}>
        <div className="logo">{initial}</div>
        <div className="name">{current?.name || 'Workspace'}</div>
        <Icon name="chevronDown" className="chev" />
      </button>
      {open && (
        <div className="ws-menu">
          {state.workspaces.map(w => (
            <button key={w.id} className={`nav-item ${w.id === state.currentWorkspaceId ? 'current' : ''}`}
              onClick={() => { setOpen(false); switchWorkspace(w.id); }}>
              <Icon name="folder" />
              <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{w.name}</span>
              {w.id === state.currentWorkspaceId && <Icon name="check" size={14} />}
            </button>
          ))}
          <div className="sep" style={{ margin: '4px 0' }} />
          <button className="nav-item" onClick={() => { setOpen(false); setView({ name: 'settings' }); }}>
            <Icon name="settings" />
            <span>Upravljaj workspaces</span>
          </button>
        </div>
      )}
    </div>
  );
};

        <NavItem icon="chart" label="Analitika" name="analytics" />

        <div className="nav-label">Workspace</div>
        <button className="nav-item" onClick={() => { openSearch(); close(); }}>

          <span>Iskanje</span>

        {project ? (
          <>

const SaveIndicator = ({ status }) => {
  const map = { idle: { cls: '', text: 'Pripravljeno' }, saving: { cls: 'saving', text: 'Shranjevanje…' }, saved: { cls: 'saved', text: 'Shranjeno' }, error: { cls: 'error', text: 'Napaka pri shranjevanju' } };
  const cur = map[status] || map.idle;
  return (
    <div className={`save-indicator ${cur.cls}`}>
      <span className="save-dot" />
      <span>{cur.text}</span>
    </div>
  );
};

    case 'ideas': return <IdeasView ctx={ctx} />;
    case 'projects': return <ProjectsView ctx={ctx} />;

    case 'pipeline': return <PipelineView ctx={ctx} />;
    case 'tasks': return <TasksView ctx={ctx} />;
    case 'contacts': return <ContactsView ctx={ctx} />;

    case 'settings': return <SettingsView ctx={ctx} />;
    default: return <Dashboard ctx={ctx} />;
  }
};

/* -------------------- DASHBOARD -------------------- */
const Dashboard = ({ ctx }) => {
  const { state, setView } = ctx;
  const activeProjects = state.projects.filter(p => p.status === 'active');
  const activeIdeas = state.ideas.filter(i => i.status !== 'archived' && i.status !== 'promoted');
  const STALE_DAYS = 14;
  const staleThreshold = now() - STALE_DAYS * 86400000;
  const staleProjects = activeProjects.filter(p => (p.updatedAt || 0) < staleThreshold);
  const hiddenGems = activeProjects.filter(p => computeScore(p.scores, state.appSettings.scoreWeights) >= 7 && p.currentPhaseKey <= 1);
  const oldIdeas = activeIdeas.filter(i => (i.updatedAt || i.createdAt) < staleThreshold);

  const allTasks = state.tasks.filter(t => t.status !== 'completed');
  const overdueTasks = allTasks.filter(t => t.dueDate && t.dueDate < now());

  const p1Tasks = state.tasks.filter(t => t.status !== 'completed' && (t.priority || 'P2') === 'P1')
    .sort((a, b) => { if (a.dueDate && b.dueDate) return a.dueDate - b.dueDate; if (a.dueDate) return -1; if (b.dueDate) return 1; return b.createdAt - a.createdAt; });
  const activeGoals = state.goals.filter(g => g.status === 'active' || g.status === 'at_risk');

  const recentActivity = useMemo(() => {
    const acts = [];
    state.projects.forEach(p => {
      (state.timelines[p.id] || []).slice(0, 3).forEach(t => acts.push({ projectId: p.id, projectTitle: p.title, ...t }));
    });
    return acts.sort((a, b) => b.createdAt - a.createdAt).slice(0, 6);
  }, [state]);

  const nextStep = (project) => {
    for (const ph of project.phases) {
      for (const s of ph.steps) {
        if (s.status !== 'completed') return { phase: ph, step: s };
      }
    }
    return null;
  };

  return (
    <div className="content">
      <div className="page-h">
        <div>
          <h1>Dashboard</h1>
          <p>Portfeljski pregled — kaj imate v rokah danes.</p>
        </div>
        <div className="page-h-actions">
          <button className="btn" onClick={() => setView({ name: 'ideas', action: 'new' })}><Icon name="plus" />Nova ideja</button>
          <button className="btn btn-primary" onClick={() => setView({ name: 'projects', action: 'new' })}><Icon name="plus" />Nov projekt</button>
        </div>
      </div>

      <div className="grid grid-4 mb-4">
        <div className="kpi"><div className="l">Aktivni projekti</div><div className="v">{activeProjects.length}</div></div>
        <div className="kpi"><div className="l">Ideje v inboxu</div><div className="v">{activeIdeas.length}</div></div>
        <div className="kpi"><div className="l">Odprte naloge</div><div className="v">{allTasks.length}</div></div>
        <div className="kpi"><div className="l">Zapadle naloge</div><div className="v" style={{ color: overdueTasks.length ? 'var(--danger)' : undefined }}>{overdueTasks.length}</div></div>
      </div>

      <div className="grid grid-2 mb-4">
        <div className="card" style={{ padding: 0 }}>
          <div className="card-h"><h3>Aktivni projekti</h3>
            <span className="text-3 text-xs" style={{ marginLeft: 'auto' }}>{activeProjects.length}</span>
          </div>
          <div>
            {activeProjects.length === 0 ? (
              <div style={{ padding: 16, color: 'var(--text-3)', fontSize: 13 }}>Še ni aktivnih projektov.</div>
            ) : (
              <table className="table">
                <tbody>
                  {activeProjects.slice(0, 6).map(p => {
                    const prog = projectProgress(p);
                    const sc = computeScore(p.scores, state.appSettings.scoreWeights);
                    const ns = nextStep(p);
                    return (
                      <tr key={p.id} onClick={() => setView({ name: 'project', id: p.id })}>
                        <td>
                          <div style={{ fontWeight: 500 }}>{p.title}</div>
                          <div className="text-xs text-3 mt-2" style={{ marginTop: 4 }}>
                            {ns ? `Naslednje: ${ns.step.title}` : 'Vse faze dokončane.'}
                          </div>
                        </td>
                        <td style={{ width: 100 }}>
                          <div className="text-xs text-3 mb-2">{prog}%</div>
                          <div className="progress-bar"><div style={{ width: `${prog}%` }} /></div>
                        </td>
                        <td style={{ width: 60 }} className="mono text-sm">{sc || '–'}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            )}
          </div>
        </div>

        <div className="card" style={{ padding: 0 }}>
          <div className="card-h"><h3>Opozorila</h3></div>
          <div style={{ padding: 14 }}>
            {staleProjects.length === 0 && hiddenGems.length === 0 && oldIdeas.length === 0 && overdueTasks.length === 0 ? (
              <div style={{ color: 'var(--text-3)', fontSize: 13 }}>Nič kritičnega. Lep dan za fokus.</div>
            ) : (
              <div className="flex" style={{ flexDirection: 'column', gap: 10 }}>
                {staleProjects.map(p => (
                  <div key={p.id} className="row-between clickable" onClick={() => setView({ name: 'project', id: p.id })}>
                    <div>
                      <Badge kind="badge-amber">Zastoj</Badge>
                      <span style={{ marginLeft: 8, fontSize: 13 }}>{p.title} — brez aktivnosti {Math.round((now() - p.updatedAt) / 86400000)} dni</span>
                    </div>
                    <Icon name="chevronRight" />
                  </div>
                ))}
                {hiddenGems.map(p => (
                  <div key={p.id} className="row-between clickable" onClick={() => setView({ name: 'project', id: p.id })}>
                    <div>
                      <Badge kind="badge-indigo">Skriti potencial</Badge>
                      <span style={{ marginLeft: 8, fontSize: 13 }}>{p.title} — ocena {computeScore(p.scores, state.appSettings.scoreWeights)}, faza {p.currentPhaseKey}</span>
                    </div>
                    <Icon name="chevronRight" />
                  </div>
                ))}
                {overdueTasks.length > 0 && (
                  <div className="row-between clickable" onClick={() => setView({ name: 'tasks' })}>
                    <div>
                      <Badge kind="badge-red">Zapadle naloge</Badge>
                      <span style={{ marginLeft: 8, fontSize: 13 }}>{overdueTasks.length} {overdueTasks.length === 1 ? 'naloga' : 'nalog'} po roku</span>
                    </div>
                    <Icon name="chevronRight" />
                  </div>
                )}
                {oldIdeas.length > 0 && (
                  <div className="row-between clickable" onClick={() => setView({ name: 'ideas' })}>
                    <div>
                      <Badge kind="badge-slate">Zastale ideje</Badge>
                      <span style={{ marginLeft: 8, fontSize: 13 }}>{oldIdeas.length} idej brez aktivnosti</span>
                    </div>
                    <Icon name="chevronRight" />
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      </div>

      <div className="grid grid-2 mb-4">
        <div className="card" style={{ padding: 0 }}>
          <div className="card-h">
            <Icon name="target" size={14} />
            <h3>Fokus danes</h3>
            <span className="text-3 text-xs mono" style={{ marginLeft: 'auto' }}>P1 naloge</span>
          </div>
          <div style={{ padding: '12px 16px' }}>
            {p1Tasks.length === 0 ? (
              <div className="text-3 text-sm">Ni P1 nalog — dodajte prioriteto ali uživajte v miru.</div>
            ) : p1Tasks.slice(0, 4).map(t => {
              const proj = state.projects.find(p => p.id === t.projectId);
              const overdue = t.dueDate && t.dueDate < now();
              return (
                <div key={t.id} className="focus-item">
                  <input type="checkbox" checked={t.status === 'completed'}
                    onChange={() => update.tasks(prev => prev.map(x => x.id === t.id ? { ...x, status: 'completed', completedAt: now() } : x))} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontWeight: 500, fontSize: 13 }}>{t.title}</div>
                    <div className="flex gap-2 text-xs text-3" style={{ marginTop: 2 }}>
                      {proj && <span>{proj.title}</span>}
                      {t.dueDate && <span className="mono" style={{ color: overdue ? 'var(--danger)' : undefined }}>do {fmtDate(t.dueDate)}</span>}
                    </div>
                  </div>
                </div>
              );
            })}
            {p1Tasks.length > 4 && <div className="text-xs text-3" style={{ marginTop: 6 }}>+{p1Tasks.length - 4} več P1 nalog</div>}
          </div>
        </div>

        <div className="card" style={{ padding: 0 }}>
          <div className="card-h">
            <Icon name="target" size={14} />
            <h3>Cilji</h3>
            <button className="btn btn-ghost btn-sm" style={{ marginLeft: 'auto' }} onClick={() => setView({ name: 'goals' })}>Odpri →</button>
          </div>
          <div style={{ padding: '12px 16px' }}>
            {activeGoals.length === 0 ? (
              <div className="text-3 text-sm">Ni aktivnih ciljev. <span className="clickable" style={{ color: 'var(--accent)' }} onClick={() => setView({ name: 'goals' })}>Dodajte cilj.</span></div>
            ) : activeGoals.slice(0, 4).map(g => {
              const krs = g.keyResults || [];
              const progress = krs.length > 0
                ? Math.round(krs.reduce((s, kr) => s + Math.min(1, (kr.current || 0) / Math.max(1, kr.target || 1)), 0) / krs.length * 100)
                : null;
              return (
                <div key={g.id} style={{ padding: '7px 0', borderBottom: '1px solid var(--border)' }}>
                  <div className="row-between" style={{ gap: 8, marginBottom: progress !== null ? 5 : 0 }}>
                    <span style={{ fontWeight: 500, fontSize: 13, flex: 1, minWidth: 0, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{g.title}</span>
                    <Badge kind={g.status === 'at_risk' ? 'badge-amber' : 'badge-indigo'}>{g.horizon === 'Q' ? 'Q' : 'Letni'}</Badge>
                  </div>
                  {progress !== null && (
                    <div>
                      <div className="progress-bar"><div style={{ width: `${progress}%`, background: progress >= 100 ? 'var(--success)' : undefined }} /></div>
                      <div className="text-xs text-3 mono" style={{ marginTop: 3 }}>{progress}%</div>
                    </div>
                  )}
                  {progress === null && krs.length === 0 && g.target && <div className="text-xs text-3">{g.target}</div>}
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <div className="grid grid-2">
        <div className="card" style={{ padding: 0 }}>
          <div className="card-h"><h3>Portfelj: napor ↔ ocena</h3></div>
          <div style={{ padding: 14 }}>
            <PortfolioScatter projects={activeProjects} ideas={activeIdeas} weights={state.appSettings.scoreWeights} ctx={ctx} />
          </div>
        </div>
        <div className="card" style={{ padding: 0 }}>
          <div className="card-h"><h3>Nedavne aktivnosti</h3></div>
          <div style={{ padding: 14, maxHeight: 320, overflowY: 'auto' }}>
            {recentActivity.length === 0 ? (
              <div className="text-3 text-sm">Še ni aktivnosti v dnevniku projektov.</div>
            ) : recentActivity.map(a => (
              <div key={a.id} className="clickable" style={{ padding: '8px 0', borderBottom: '1px solid var(--border)' }} onClick={() => setView({ name: 'project', id: a.projectId })}>
                <div className="text-xs text-3 mono">{fmtRelative(a.createdAt)} · {a.projectTitle}</div>
                <div className="text-sm" style={{ marginTop: 2 }}>{a.body.length > 120 ? a.body.slice(0, 120) + '…' : a.body}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

const PortfolioScatter = ({ projects, ideas, weights, ctx }) => {
  const items = [
    ...projects.map(p => ({ kind: 'project', id: p.id, title: p.title, scores: p.scores })),
    ...ideas.map(i => ({ kind: 'idea', id: i.id, title: i.title, scores: i.scores })),
  ].filter(x => typeof x.scores?.effort === 'number' && Object.keys(x.scores).length > 1);

  if (items.length === 0) {
    return <div className="text-3 text-sm">Ocenite ideje in projekte, da se prikažejo v razsevnem diagramu.</div>;
  }

  return (
    <div>
      <div className="scatter">
        <div className="scatter-grid" />
        <span className="scatter-axis" style={{ top: 4, left: 8 }}>↑ Ocena</span>
        <span className="scatter-axis" style={{ bottom: 4, right: 8 }}>Napor →</span>
        {items.map(it => {
          const sc = computeScore(it.scores, weights);
          const effort = it.scores.effort || 5;
          const x = 4 + (effort - 1) / 9 * 92;
          const y = 4 + (10 - sc) / 10 * 92;
          return (
            <div key={it.id} className="scatter-dot" title={`${it.title} · ocena ${sc} · napor ${effort}`}
              style={{ left: `${x}%`, top: `${y}%`, background: it.kind === 'project' ? 'var(--accent)' : 'var(--info)' }}
              onClick={() => ctx.setView(it.kind === 'project' ? { name: 'project', id: it.id } : { name: 'ideas', selectIdea: it.id })} />
          );
        })}
      </div>
      <div className="flex gap-3 mt-2 text-xs text-3">
        <span className="flex gap-2" style={{ alignItems: 'center' }}><span style={{ width: 8, height: 8, borderRadius: 4, background: 'var(--accent)' }} />Projekt</span>
        <span className="flex gap-2" style={{ alignItems: 'center' }}><span style={{ width: 8, height: 8, borderRadius: 4, background: 'var(--info)' }} />Ideja</span>
        <span style={{ marginLeft: 'auto' }}>Cilj: zgornji levi kot</span>
      </div>
    </div>
  );
};

const IdeasView = ({ ctx }) => {

  const filtered = state.ideas.filter(i => filter === 'all' ? i.status !== 'archived' : i.status === filter);

    if (sortBy === 'created') return b.createdAt - a.createdAt;
    return (b.updatedAt || b.createdAt) - (a.updatedAt || a.createdAt);
  });

  const createIdea = (data) => {

        <div className="page-h-actions">

            <option value="raw">Surove</option>

  const updateProject = (patch) => update.projects(prev => prev.map(p => p.id === id ? { ...p, ...patch, updatedAt: now() } : p));
  const updatePhase = (phaseId, patch) => updateProject({ phases: project.phases.map(ph => ph.id === phaseId ? { ...ph, ...patch } : ph) });
  const updateStep = (phaseId, stepId, patch) => updateProject({
    phases: project.phases.map(ph => ph.id === phaseId ? {
      ...ph, steps: ph.steps.map(s => s.id === stepId ? { ...s, ...patch } : s)
    } : ph)
  });

  const sc = computeScore(project.scores, state.appSettings.scoreWeights);
  const prog = projectProgress(project);
  const currentPhase = project.phases.find(p => p.key === project.currentPhaseKey) || project.phases[0];

  return (
    <>
      <div className="proj-header">
        <div>
          <input value={project.title}
            onChange={e => updateProject({ title: e.target.value })}
            style={{ border: 'none', outline: 'none', font: 'inherit', fontSize: 20, fontWeight: 600, letterSpacing: '-0.02em', width: '100%', background: 'transparent' }} />
          <div className="flex gap-3 mt-2" style={{ alignItems: 'center', flexWrap: 'wrap' }}>
            <StatusBadge status={project.status === 'active' ? 'in_progress' : (project.status === 'archived' ? 'archived' : 'not_started')} />
            <Badge kind="badge-indigo">Faza {currentPhase.key} · {currentPhase.title}</Badge>
            <span className="text-xs text-3 mono">{prog}% dokončano · Ocena {sc || '–'}</span>
            <TagList ids={project.tags || []} tags={state.tags} />
          </div>
        </div>
        <div className="flex gap-2" style={{ alignItems: 'flex-start' }}>
          <select className="select" style={{ width: 130 }} value={project.status} onChange={e => updateProject({ status: e.target.value })}>
            <option value="active">Aktiven</option>
            <option value="paused">Pavziran</option>
            <option value="archived">Arhiviran</option>
          </select>
          <button className="btn" onClick={() => setShowExport(true)}><Icon name="download" />Markdown</button>
          <button className="btn btn-ghost btn-icon btn-danger" onClick={() => setConfirmDelete(true)}><Icon name="trash" /></button>
        </div>
      </div>

      <div className="phase-rail">
        {project.phases.map(ph => {
          const done = ph.steps.filter(s => s.status === 'completed').length;
          const total = ph.steps.length;
          return (
            <button key={ph.id} className={`phase-pill ${ph.key === project.currentPhaseKey ? 'active' : ''}`}
              onClick={() => updateProject({ currentPhaseKey: ph.key })}>
              <span className="phase-num">{ph.key}</span>
              <span>{ph.title}</span>
              <span className="progress">{done}/{total}</span>
            </button>
          );
        })}
      </div>

      <div className="flex gap-2" style={{ borderBottom: '1px solid var(--border)', padding: '0 24px', background: 'var(--bg)' }}>
        {[
          ['phases','Faze in koraki'],
          ['details','Podrobnosti'],
          ['scoring','Ocenjevanje'],
          ['hypotheses','Hipoteze in eksperimenti'],
          ['finance','Finance'],
          ['timeline','Dnevnik in odločitve'],
          ['zapiski','Zapiski'],
          ['links','Povezave'],
        ].map(([k, l]) => (
          <button key={k} className="btn btn-ghost" style={{
            borderRadius: 0, borderBottom: tab === k ? '2px solid var(--accent)' : '2px solid transparent',
            color: tab === k ? 'var(--text)' : 'var(--text-2)', fontWeight: 500, paddingBottom: 10, paddingTop: 10
          }} onClick={() => setTab(k)}>{l}</button>
        ))}
      </div>

      <div className="content">
        {tab === 'phases' && (
          <PhaseDetail phase={currentPhase} project={project} ctx={ctx}
            updatePhase={(patch) => updatePhase(currentPhase.id, patch)}
            updateStep={(stepId, patch) => updateStep(currentPhase.id, stepId, patch)} />
        )}
        {tab === 'details' && <ProjectDetails project={project} ctx={ctx} updateProject={updateProject} />}
        {tab === 'scoring' && (
          <div className="card">
            <ScoringPanel scores={project.scores || {}} weights={state.appSettings.scoreWeights}
              onChange={(scores) => updateProject({ scores })} />
          </div>
        )}
        {tab === 'hypotheses' && <HypothesesPanel project={project} updateProject={updateProject} />}
        {tab === 'finance' && <FinancePanel projectId={id} ctx={ctx} />}
        {tab === 'timeline' && <TimelinePanel projectId={id} ctx={ctx} />}
        {tab === 'zapiski' && (
          <div>
            <div className="text-sm text-2 mb-3">Prosti delovni zapiski — teze, skice, opombe, ki ne sodijo v časovni dnevnik.</div>
            <textarea
              className="textarea"
              style={{ minHeight: 420, fontFamily: 'var(--mono)', fontSize: 12, lineHeight: 1.7 }}
              value={project.notes || ''}
              onChange={e => updateProject({ notes: e.target.value })}
              placeholder={"Delovni zapiski…\n\nPišete lahko karkoli — hipoteze, skice, naslove za pogovore, opombe iz sestankov, TODO liste.\n\nPodpora za [[wiki-povezave]] na druge entitete."} />
            {(project.notes || '').trim() && (
              <div className="card-soft mt-3">
                <div className="text-xs text-3 mb-2" style={{ fontWeight: 600 }}>Predogled</div>
                <LinkedText text={project.notes} ctx={ctx} />
              </div>
            )}
          </div>
        )}
        {tab === 'links' && (
          <div className="card">
            <h3 style={{ margin: '0 0 4px', fontSize: 13, fontWeight: 600 }}>Sklicevanja na ta projekt</h3>
            <p className="text-2 text-sm mb-3">Mesta, kjer drugi zapisi omenjajo <code style={{ fontFamily: 'var(--mono)', background: 'var(--panel)', padding: '1px 6px', borderRadius: 3 }}>[[{project.title}]]</code>.</p>
            <Backlinks targetType="project" targetId={id} ctx={ctx} />
          </div>
        )}
      </div>

      {confirmDelete && (
        <Confirm title="Izbriši projekt" body={`»${project.title}« in vsi pripadajoči podatki bodo izbrisani. Tega ni mogoče razveljaviti.`}
          confirmLabel="Izbriši" danger
          onCancel={() => setConfirmDelete(false)}
          onConfirm={() => {
            update.projects(prev => prev.filter(p => p.id !== id));
            update.timeline(id, () => undefined);
            update.finances(prev => prev.filter(f => f.projectId !== id));
            update.tasks(prev => prev.filter(t => t.projectId !== id));
            setView({ name: 'projects' });
          }} />
      )}
      {showExport && <ExportMarkdown project={project} timeline={state.timelines[id] || []} tags={state.tags} weights={state.appSettings.scoreWeights} finances={state.finances.filter(f => f.projectId === id)} onClose={() => setShowExport(false)} />}
    </>
  );
};

const PhaseDetail = ({ phase, project, ctx, updatePhase, updateStep }) => {
  const [openSteps, setOpenSteps] = useState({});
  const toggle = (id) => setOpenSteps(prev => ({ ...prev, [id]: !prev[id] }));

  const completed = phase.steps.filter(s => s.status === 'completed').length;
  const allDone = completed === phase.steps.length;

  useEffect(() => {
    if (allDone && phase.status !== 'completed') updatePhase({ status: 'completed', completedAt: now() });
    else if (!allDone && phase.status === 'completed') updatePhase({ status: 'in_progress', completedAt: null });
  }, [allDone]);

  return (
    <div>
      <div className="card-soft mb-4">
        <div className="row-between mb-2">
          <div>
            <Badge kind="badge-indigo">Faza {phase.key}</Badge>
            <span style={{ marginLeft: 8, fontSize: 16, fontWeight: 600 }}>{phase.title}</span>
          </div>
          <StatusBadge status={phase.status} />
        </div>
        <div className="text-2 text-sm">{phase.summary}</div>
        <div className="progress-bar mt-3"><div style={{ width: `${phase.steps.length ? completed/phase.steps.length*100 : 0}%` }} /></div>
      </div>

      {phase.steps.map((step, idx) => (
        <StepCard key={step.id} step={step} index={idx + 1} ctx={ctx}
          open={!!openSteps[step.id]} onToggle={() => toggle(step.id)}
          onChange={(patch) => updateStep(step.id, patch)} />
      ))}
    </div>
  );
};

const StepCard = ({ step, index, open, onToggle, onChange, ctx }) => {
  const [response, setResponse] = useState(step.response || '');
  const [commentText, setCommentText] = useState('');

  /* Debounced save of response */
  useEffect(() => {
    if (response === step.response) return;
    const t = setTimeout(() => onChange({ response }), 300);
    return () => clearTimeout(t);
  }, [response]);
  useEffect(() => setResponse(step.response || ''), [step.id]);

  const toggleStatus = (status) => {
    if (status === 'completed' && step.status !== 'completed') onChange({ status, completedAt: now() });
    else if (status !== 'completed') onChange({ status, completedAt: null });
    else onChange({ status });
  };

  const addComment = () => {
    if (!commentText.trim()) return;
    onChange({ comments: [...(step.comments || []), { id: uid(), body: commentText.trim(), createdAt: now() }] });
    setCommentText('');
  };

  return (
    <div className="step">
      <div className="step-h" onClick={onToggle}>
        <div className="step-num">{index}</div>
        <div className="step-title">{step.title}</div>
        <StatusBadge status={step.status} />
        {step.completedAt && <span className="text-xs text-3 mono">{fmtDate(step.completedAt)}</span>}
        <Icon name={open ? 'chevronDown' : 'chevronRight'} />
      </div>
      {open && (
        <div className="step-body">
          <div className="step-desc">{step.description}</div>
          <div className="mb-3">
            <div className="text-xs text-3 mb-2 mono" style={{ textTransform: 'uppercase', letterSpacing: '0.04em' }}>Vodilna vprašanja</div>
            <ul className="prompts">
              {step.prompts.map((p, i) => <li key={i}>{p}</li>)}
            </ul>
          </div>
          <div className="mb-3">
            <label className="label">Vaši odgovori in opombe</label>
            <textarea className="textarea" value={response} onChange={e => setResponse(e.target.value)}
              placeholder="Pišite v poljubni dolžini. Samodejno se shranjuje." style={{ minHeight: 140 }} />
          </div>
          <div className="flex gap-2 mb-4">
            <button className={`btn btn-sm ${step.status === 'not_started' ? 'btn-primary' : ''}`} onClick={() => toggleStatus('not_started')}>Ni začeto</button>
            <button className={`btn btn-sm ${step.status === 'in_progress' ? 'btn-primary' : ''}`} onClick={() => toggleStatus('in_progress')}>V teku</button>
            <button className={`btn btn-sm ${step.status === 'completed' ? 'btn-primary' : ''}`} onClick={() => toggleStatus('completed')}>Dokončano</button>
          </div>
          <div>
            <div className="text-xs text-3 mb-2 mono" style={{ textTransform: 'uppercase', letterSpacing: '0.04em' }}>Komentarji koraka</div>
            <div className="flex gap-2 mb-3">
              <input className="input" placeholder="Dopiši opažanje ali vir…" value={commentText}
                onChange={e => setCommentText(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && addComment()} />
              <button className="btn btn-primary" onClick={addComment} disabled={!commentText.trim()}>Dodaj</button>
            </div>
            {(step.comments || []).slice().reverse().map(c => (
              <div key={c.id} className="timeline-entry">
                <div className="timeline-meta">{fmtDateTime(c.createdAt)} · {fmtRelative(c.createdAt)}</div>
                <div className="timeline-body"><LinkedText text={c.body} ctx={ctx} /></div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
};

const ProjectDetails = ({ project, ctx, updateProject }) => {

      <div className="card">

        <label className="label" style={{ marginTop: 12 }}>Oznake</label>
        <TagInput value={project.tags || []} tags={state.tags}
          onChange={(ids) => updateProject({ tags: ids })}
          onCreate={(name, cb) => createTag(name, cb)} />
      </div>
      <div className="card">
        <h3 style={{ margin: '0 0 12px', fontSize: 13, fontWeight: 600 }}>Metapodatki</h3>
        <div className="text-sm text-2" style={{ display: 'grid', gridTemplateColumns: 'auto 1fr', gap: '8px 14px' }}>
          <span className="text-3">Ustvarjeno</span><span className="mono text-xs">{fmtDateTime(project.createdAt)}</span>
          <span className="text-3">Posodobljeno</span><span className="mono text-xs">{fmtDateTime(project.updatedAt)}</span>
          <span className="text-3">Trenutna faza</span><span>{project.currentPhaseKey} · {project.phases.find(p => p.key === project.currentPhaseKey)?.title}</span>
